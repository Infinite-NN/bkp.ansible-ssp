# ==============================================================
# Ansible Inventory — Production Environment
# Hosts and group configurations for SBCE SSP + PCF pipeline
# ==============================================================

# ──────────────────────────────────────────────────────────
# SBC GROUP — SBCE Service nodes
# ──────────────────────────────────────────────────────────
[sbc]
# SBC Production Nodes
# Format: <hostname_or_ip> ansible_host=<ip> [optional_vars]

sbc-prod-001 ansible_host=10.133.39.115 ansible_user=devops sbc_id=001 sbc_region=prod datacenter=dc1
#sbc-prod-002 ansible_host=10.133.39.116 sbc_id=002 sbc_region=prod datacenter=dc1

# Add additional SBCs as needed
# sbc-prod-003 ansible_host=10.133.39.117 sbc_id=003 sbc_region=prod datacenter=dc1


# ──────────────────────────────────────────────────────────
# BUILD SERVER GROUP — PCF build compilation host
# ──────────────────────────────────────────────────────────
[buildserver]
# Build Server
# Responsible for: PCF module compilation, RPM generation

buildserver-prod ansible_host=10.133.43.170 ansible_user=root builder_id=001 build_region=prod


# ──────────────────────────────────────────────────────────
# GROUP VARIABLES
# ──────────────────────────────────────────────────────────

[all:vars]
# ── Ansible Connection Settings ────────────────────────────
#ansible_connection = ssh
#ansible_port = 22
#ansible_user = root

# Note: SSH key should be configured in Jenkins credential store
# and passed via -e ansible_ssh_private_key_file=<path>

# ── Privilege Escalation (if needed) ──────────────────────
# Uncomment if not running as root:
# ansible_become = true
# ansible_become_method = sudo
# ansible_become_user = root

# ── SSH Configuration ──────────────────────────────────────
ansible_ssh_common_args = -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o BatchMode=yes

# ── Timeouts ──────────────────────────────────────────────
ansible_connection_timeout = 10
ansible_timeout = 300

# ── Python Interpreter ────────────────────────────────────
ansible_python_interpreter = /usr/bin/python3

# ──────────────────────────────────────────────────────────

[sbc:vars]
# ── SBC-Specific Configuration ─────────────────────────────


# Logging
sbc_log_dir = /var/log/avaya_pipeline
sbc_enable_detailed_logging = true

# Service Management
sbc_service_restart_on_error = true
sbc_service_startup_timeout = 300

# SSP Configuration
sbc_ssp_install_path = /opt/ssp
sbc_ssp_backup_enabled = true
sbc_ssp_backup_retention_days = 7

# Security Updates
sbc_security_updates_enabled = true
sbc_auto_apply_security_patches = false

# Health Checks
sbc_enable_health_checks = true
sbc_health_check_interval = 300


[buildserver:vars]
# ── Build Server Specific Configuration ───────────────────

# Build Configuration
builder_work_dir = /tmp/pcf_builds
builder_releases_dir = /root/releases
builder_cache_dir = /var/cache/pcf_builds

# Build Timeouts
builder_build_timeout = 10800
builder_compile_timeout = 7200

# Logging
builder_log_dir = /var/log/pcf_builds
builder_keep_build_logs = true
builder_log_retention_days = 90

# Cleanup
builder_cleanup_old_builds = true
builder_cleanup_age_days = 7
builder_cleanup_min_disk_free_gb = 20

# Parallel Builds
builder_max_parallel_builds = 4