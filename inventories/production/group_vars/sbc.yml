---
# =============================================================
# SBC (SBCE Service Control) Variables -- Production
# Applies to: sbc group in inventory
# Used by: ssp_install, post_reboot, security_updates roles
# =============================================================

# ---------------------------------------------------------
# SSP Installation Paths
# ---------------------------------------------------------

# Working directory for SSP extraction/staging
ssp_work_dir: "/opt/ssp_work"

# Final SSP installation directory
ssp_install_dir: "/opt/ssp"

# SSP backup directory
ssp_backup_dir: "/opt/ssp_backup"

# ---------------------------------------------------------
# Repository Paths
# ---------------------------------------------------------

# Base repository directory
repo_base: "/repos"

# Repository subdirectories
repo_baseos_path: "/repos/BaseOS"
repo_appstream_path: "/repos/AppStream"
repo_additional_path: "/repos/AdditionalRPMs"
repo_archive_path: "/repos/archive"

# ---------------------------------------------------------
# IPCS Service Configuration
# ---------------------------------------------------------

# IPCS control/init script
ipcs_script: "/usr/local/ipcs/icu3/scripts/ipcs-init.py"

# IPCS service name
ipcs_service_name: "IPCS"

# IPCS startup timeout (seconds)
ipcs_startup_timeout: 600

# IPCS GUI check retries
ipcs_gui_check_retries: 60

# IPCS GUI check delay (seconds)
ipcs_gui_check_delay: 10

# ---------------------------------------------------------
# Backup & Archive Configuration
# ---------------------------------------------------------

# Backup base directory
backup_base: "/archive/backup/upgrade"

# Backup retention (number of backups to keep)
backup_retention_count: 3

# Backup compression
backup_compression: "gzip"

# ---------------------------------------------------------
# Logging & Reporting
# ---------------------------------------------------------

# Patch log (created by patchSBC)
patch_log: "/archive/log/icu/patch.log"

# Security update report
report_file: "/tmp/security_update_report.txt"

# RPM inventory file
rpm_inventory: "/tmp/rpm_inventory.txt"

# ---------------------------------------------------------
# DNF Repository Configuration
# ---------------------------------------------------------

# Repository names (RHEL 8+)
dnf_repos:
  baseos: "rhel-8-for-x86_64-baseos-rpms"
  appstream: "rhel-8-for-x86_64-appstream-rpms"

# Packages to exclude from updates
dnf_exclude_packages:
  - "nginx*"
  - "docker*"
  - "podman*"
  - "kernel-debug*"

# ---------------------------------------------------------
# SSP Configuration & Validation
# ---------------------------------------------------------

# SSP branch version pattern
ssp_branch_pattern: '^10\.2\.1\.\d+$'

# SSP directory naming pattern (01-MonYYYY)
ssp_dir_pattern: '^[0-9]{2}-[a-z]{3}[0-9]{4}$'

# Validate SSP structure
validate_ssp_structure: true

# SSP installation method (move or extract)
ssp_install_method: "auto"

# ---------------------------------------------------------
# Security Update Configuration
# ---------------------------------------------------------

# Download security updates automatically
auto_download_security_updates: true

# Download additional RPMs
download_additional_rpms: true

# Update PCF modules
update_pcf_modules: true

# Update SBC release info
update_sbc_release: true

# ---------------------------------------------------------
# Timeout Configuration (seconds)
# ---------------------------------------------------------

# SSP move/copy timeout
ssp_move_timeout: 300

# RPM download timeout
rpm_download_timeout: 1200

# RPM installation timeout
rpm_install_timeout: 600

# Service startup timeout
service_startup_timeout: 300

# Reboot timeout
reboot_timeout: 600

# Post-reboot reconnection timeout
post_reboot_connect_timeout: 30

# ---------------------------------------------------------
# Retry Configuration
# ---------------------------------------------------------

# Retry count for operations
operation_retry_count: 3

# Retry delay (seconds)
operation_retry_delay: 10

# Download retry count
download_retry_count: 5

# Download retry delay (seconds)
download_retry_delay: 30

# ---------------------------------------------------------
# Disk Space Requirements (GB)
# ---------------------------------------------------------

# Minimum free space on /opt
ssp_min_opt_free_gb: 2

# Minimum free space on /
ssp_min_root_free_gb: 1

# Minimum free space for repositories
repo_min_free_gb: 5

# ---------------------------------------------------------
# Cleanup & Maintenance
# ---------------------------------------------------------

# Cleanup work directories after completion
cleanup_work_dirs: true

# Cleanup on failure (vs. keep for diagnosis)
cleanup_on_failure: false

# Archive old SSP backups
archive_old_backups: true

# Archive old repositories
archive_old_repos: true

# ---------------------------------------------------------
# Feature Flags
# ---------------------------------------------------------

# Enable comprehensive health checks
enable_health_checks: true

# Enable pre-reboot backup
enable_preboot_backup: true

# Enable post-reboot validation
enable_post_reboot_validation: true

# Enable security report generation
enable_security_reports: true

# Enable HTML reporting
enable_html_reporting: true

# ---------------------------------------------------------
# Error Handling
# ---------------------------------------------------------

# Fail fast on errors
fail_fast: true

# Continue on non-critical failures
continue_on_non_critical: true

# Abort entire play on critical error
abort_on_critical_error: true

# ---------------------------------------------------------
# Notification & Alerting
# ---------------------------------------------------------

# Send notifications on completion
send_notifications: false

# Notify only on failures
notify_on_failure_only: true

# Notification recipients
sbc_notification_recipients: []

# ---------------------------------------------------------
# Reboot Configuration
# ---------------------------------------------------------

# Auto-reboot after SSP installation
auto_reboot: true

# Reboot message
reboot_message: "Avaya SSP Pipeline initiated system reboot"

# Pre-reboot delay (seconds)
pre_reboot_delay: 60

# Post-reboot delay (seconds)
post_reboot_delay: 180

# ---------------------------------------------------------
# Kernel & System Updates
# ---------------------------------------------------------

# Update kernel during security updates
update_kernel: true

# Update system packages
update_system_packages: true

# ---------------------------------------------------------
# Performance & Optimization
# ---------------------------------------------------------

# Enable parallel RPM downloads
parallel_downloads: true

# Max parallel downloads
max_parallel_downloads: 4

# ---------------------------------------------------------
# Diagnostics & Debugging
# ---------------------------------------------------------

# Collect full diagnostics on failure
collect_diagnostics_on_failure: true

# Verbose logging
verbose_logging: false

# Debug mode
debug_mode: false

# Keep debug files on failure
keep_debug_files: true