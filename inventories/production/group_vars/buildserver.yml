---
# =============================================================
# Build Server Variables — Production Environment
# Applies to: buildserver group in inventory
# Used by: build_pcf role
# =============================================================

# ─────────────────────────────────────────────────────────
# Build Environment Paths
# ─────────────────────────────────────────────────────────

# Chroot sandbox for isolated PCF builds
sandbox_path: "/sandbox/rhel810"

# Build agent home directory (CI agent)
build_agent_home: "/home/bambooagent"

# Bamboo build working directory
build_base_dir: "/home/bambooagent/agent1/xml-data/build-dir/nn"

# SVN repositories (synced from remote)
svn_base: "/home/bambooagent/SVN_repos"

# Release/artifacts directory
release_base: "/root/releases"

# Kernel RPM staging area
kernel_work_dir: "/tmp/kernel_build"

# ─────────────────────────────────────────────────────────
# Build Script Configuration
# ─────────────────────────────────────────────────────────

# PCF build script path relative to SVN checkout
build_pcf_script: "icu/buildtools/bambooBuildRpms"

# Build system user
build_user: "bambooagent"

# ─────────────────────────────────────────────────────────
# Source Control Configuration
# ─────────────────────────────────────────────────────────

# SCM base URL for branch discovery
scm_base_url: "https://scm.forge.avaya.com/svnroot/aurora/branches"

# SCM branch pattern to match
scm_branch_pattern: '^10\.2\.1\.[0-9]+_orion_int$'

# ─────────────────────────────────────────────────────────
# Build Timeout Configuration (seconds)
# ─────────────────────────────────────────────────────────

# Full PCF build timeout (3 hours)
build_timeout_max: 10800

# Kernel preparation timeout (20 minutes)
kernel_timeout_max: 1200

# RPM verification timeout (5 minutes)
rpm_check_timeout: 300

# ─────────────────────────────────────────────────────────
# Build Retry Configuration
# ─────────────────────────────────────────────────────────

# Retry count for build failures
build_retry_count: 2

# Delay between retries (seconds)
build_retry_delay: 60

# ─────────────────────────────────────────────────────────
# Disk Space Requirements (GB)
# ─────────────────────────────────────────────────────────

# Minimum free space on build filesystem
build_min_disk_free_gb: 5

# Minimum free space on /
build_min_root_disk_free_gb: 2

# ─────────────────────────────────────────────────────────
# Build Artifact Management
# ─────────────────────────────────────────────────────────

# Archive old RPMs before building
archive_old_rpms: true

# Archive location
rpm_archive_path: "{{ release_base }}/archive"

# Keep how many recent builds
keep_recent_builds: 5

# ─────────────────────────────────────────────────────────
# Build Validation & Verification
# ─────────────────────────────────────────────────────────

# Verify RPM signatures after build
verify_rpm_signatures: true

# Generate checksums for built RPMs
generate_rpm_checksums: true

# Verify kernel RPM integrity
verify_kernel_rpm: true

# ─────────────────────────────────────────────────────────
# Parallel Build Configuration
# ─────────────────────────────────────────────────────────

# Maximum parallel builds
max_parallel_builds: 4

# ─────────────────────────────────────────────────────────
# Logging & Reporting
# ─────────────────────────────────────────────────────────

# Enable detailed build logging
enable_build_logging: true

# Keep build logs for diagnosis
keep_logs_on_failure: true

# Log retention (days)
build_log_retention_days: 30

# ─────────────────────────────────────────────────────────
# Cleanup Behavior
# ─────────────────────────────────────────────────────────

# Clean build directory after success
cleanup_build_on_success: false

# Clean kernel work dir after success
cleanup_kernel_on_success: false

# Aggressive cleanup (remove everything)
aggressive_cleanup: false

# ─────────────────────────────────────────────────────────
# Feature Flags
# ─────────────────────────────────────────────────────────

# Enable kernel updates during build
enable_kernel_updates: true

# Enable parallel compilation (if supported)
enable_parallel_compile: true

# Enable debug symbols in build
enable_debug_symbols: false

# ─────────────────────────────────────────────────────────
# Error Handling & Recovery
# ─────────────────────────────────────────────────────────

# Fail fast on first error
fail_fast: true

# Automatic rollback on failure
auto_rollback: false

# Preserve build artifacts on failure
preserve_on_failure: true

# ─────────────────────────────────────────────────────────
# Notification Settings
# ─────────────────────────────────────────────────────────

# Notify on build completion
notify_on_completion: true

# Notify only on failure
notify_only_failures: false

# Email recipients
build_notification_recipients: []

# ─────────────────────────────────────────────────────────
# Chroot & Sandbox Configuration
# ─────────────────────────────────────────────────────────

# Validate chroot exists before build
validate_chroot: true

# Sandbox bind mounts
sandbox_binds:
  - "/proc"
  - "/sys"
  - "/dev"

# Cleanup chroot after build
cleanup_chroot: false

# ─────────────────────────────────────────────────────────
# Performance Tuning
# ─────────────────────────────────────────────────────────

# CPU affinity (core range, or empty for all)
build_cpu_affinity: ""

# Nice level for build process (-20 to 19)
build_nice_level: 0

# I/O scheduler priority (idle, best-effort, realtime)
build_io_priority: "best-effort"

# ─────────────────────────────────────────────────────────
# Security & Access Control
# ─────────────────────────────────────────────────────────

# Require password for sudo operations
require_sudo_password: false

# Run build as unprivileged user (if applicable)
run_as_unprivileged: false

# ─────────────────────────────────────────────────────────
# Development & Debugging
# ─────────────────────────────────────────────────────────

# Enable verbose build output
verbose_build_output: false

# Enable trace mode (set -x equivalent)
trace_build_commands: false

# Save build environment for inspection
save_build_environment: false