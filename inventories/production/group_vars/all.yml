---
# =============================================================
# Global Configuration -- Production Environment
# All variables inherited by all hosts and groups
# =============================================================

# ---------------------------------------------------------
# Environment & Deployment
# ---------------------------------------------------------

environment: "production"
deployment_stage: "{{ environment }}"

# ---------------------------------------------------------
# Artifact Server Configuration
# ---------------------------------------------------------

artifact_server:
  base_url: "http://10.133.43.170"
  port: 80
  timeout: 30
  verify_ssl: false
  
  releases_path: "/releases"
  ssp_path: "/releases/SSP"
  pcf_path: "/releases/PCF"
  security_rpms_path: "/releases/security"
  
  # Fallback servers (in case primary is down)
  fallback_servers: []

# ---------------------------------------------------------
# PCF Build Configuration
# ---------------------------------------------------------

pcf:
  # Default branch pattern (can be overridden via -e flag)
  branch_pattern: "10.2.1.*_orion_int"
  
  # Build configuration
  build_root: "/home/bambooagent/"
  build_temp_root: "/home/bambooagent/agent1/xml-data/build-dir/nn/"
  releases_dir: "/root/releases"
  
  # Build retries and timeouts
  build_timeout_seconds: 10800  # 3 hours
  build_retries: 2
  
  # Artifact verification
  verify_rpms: true
  rpm_signature_check: true

# ---------------------------------------------------------
# SSP Installation Configuration
# ---------------------------------------------------------

ssp:
  # Version and paths
  version: "latest"
  install_path: "/opt/ssp"
  backup_path: "/opt/ssp_backup"
  
  # Download configuration
  download_timeout: 600  # 10 minutes
  download_retries: 5
  download_retry_delay: 30
  
  # Installation options
  skip_preinstall_checks: false
  allow_downgrade: false
  
  # Post-install
  service_startup_timeout: 300  # 5 minutes
  service_healthcheck_retries: 60
  service_healthcheck_delay: 10
  
  # Reboot handling
  auto_reboot: true
  reboot_timeout: 600  # 10 minutes
  post_reboot_wait: 300  # 5 minutes

# ---------------------------------------------------------
# Security Updates Configuration
# ---------------------------------------------------------

security_updates:
  # Enable/disable
  enabled: true
  auto_apply: true
  
  # Update sources
  baseos_rpms_path: "/releases/security/baseos"
  appstream_rpms_path: "/releases/security/appstream"
  
  # Timeout configuration
  download_timeout: 600
  install_timeout: 1800  # 30 minutes
  
  # Retry configuration
  max_retries: 3
  retry_delay: 30
  
  # Exclusions (packages never updated)
  exclude_packages:
    - kernel
    - kernel-*
    - grub2-*
  
  # Security patch reporting
  generate_report: true
  report_path: "/tmp/security_update_report.txt"

# ---------------------------------------------------------
# Logging Configuration
# ---------------------------------------------------------

logging:
  base_dir: "/var/log/avaya_pipeline"
  
  # Log levels: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  
  # Log retention
  retention_days: 90
  max_log_size_mb: 100
  
  # Specific log files
  logs:
    ssp_install: "/var/log/avaya_pipeline/ssp_install.log"
    pcf_build: "/var/log/avaya_pipeline/pcf_build.log"
    security_updates: "/var/log/avaya_pipeline/security_updates.log"
    post_reboot: "/var/log/avaya_pipeline/post_reboot.log"
    ansible: "/var/log/avaya_pipeline/ansible.log"

# ---------------------------------------------------------
# Timeouts (seconds)
# ---------------------------------------------------------

timeouts:
  # Network operations
  download: 600        # 10 minutes
  ssh_connect: 30      # 30 seconds
  http_request: 60     # 1 minute
  
  # System operations
  reboot: 600          # 10 minutes
  service_startup: 300 # 5 minutes
  gui_startup: 1800    # 30 minutes
  health_check: 600    # 10 minutes
  
  # Build operations
  build_stage: 10800   # 3 hours
  unit_test: 1800      # 30 minutes
  integration_test: 3600  # 1 hour

# ---------------------------------------------------------
# Retry Configuration
# ---------------------------------------------------------

retries:
  # Default retry counts
  default: 5
  
  # Specific operation retries
  download: 10
  ssh_command: 3
  health_check: 60
  service_restart: 5
  
# Retry delays (seconds)
retry_delay:
  default: 15
  download: 30
  ssh_command: 5
  health_check: 30
  service_restart: 10

# ---------------------------------------------------------
# Service Management
# ---------------------------------------------------------

services:
  # Services to manage during deployment
  ssp:
    name: "ssp"
    enabled: true
    state: "started"
    timeout: 300
  
  pcf:
    name: "pcf"
    enabled: true
    state: "started"
    timeout: 300

# ---------------------------------------------------------
# Validation & Health Checks
# ---------------------------------------------------------

validation:
  # Pre-installation checks
  min_disk_free_gb: 10
  min_memory_mb: 2048
  required_packages:
    - bash
    - curl
    - rsync
    - systemd
    - sudo
  
  # Post-installation checks
  verify_ssp_installation: true
  verify_pcf_modules: true
  run_health_checks: true
  
  # Service validation
  service_response_timeout: 30
  max_service_restart_attempts: 3

# ---------------------------------------------------------
# Reporting & Notifications
# ---------------------------------------------------------

reporting:
  enabled: true
  
  # Report generation
  generate_html_report: true
  generate_text_report: true
  report_format: "html"
  report_path: "/tmp"
  
  # Report details
  include_logs: true
  include_metrics: true
  include_errors: true
  
  # Report retention
  keep_reports: true
  report_retention_days: 90

# ---------------------------------------------------------
# Ansible Behavior
# ---------------------------------------------------------

ansible_settings:
  # Connection settings
  ansible_connection: "ssh"
  ansible_port: 22
  ansible_user: "root"
  
  # SSH configuration
  ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null"
  
  # Privilege escalation
  ansible_become: true
  ansible_become_method: "sudo"
  ansible_become_user: "root"
  
  # Timeout settings
  ansible_timeout: 300
  ansible_connection_timeout: 10
  
  # Gather facts
  gather_subset: ['all']
  
  # Async settings
  ansible_async_dir: "/tmp/.ansible_async"

# ---------------------------------------------------------
# Fact Caching (optional - for large deployments)
# ---------------------------------------------------------

fact_caching: "jsonfile"
fact_caching_connection: "/tmp/ansible_facts"
fact_caching_timeout: 86400  # 24 hours

# ---------------------------------------------------------
# Custom Variables (for role-specific configurations)
# ---------------------------------------------------------

# Build metadata
build_info:
  initiator: "{{ lookup('env', 'BUILD_USER') | default('automated') }}"
  build_number: "{{ lookup('env', 'BUILD_NUMBER') | default('0') }}"
  build_timestamp: "{{ ansible_date_time.iso8601 }}"

# Deployment tracking
deployment_tracking:
  enabled: true
  track_by_hostname: true
  track_by_ip: true
  export_csv: true
  export_path: "/tmp/deployment_tracking.csv"

# ---------------------------------------------------------
# Feature Flags (for gradual rollouts)
# ---------------------------------------------------------

features:
  parallel_build: true
  incremental_updates: true
  health_check_on_boot: true
  automated_rollback_on_failure: false
  dry_run_mode: false

# ---------------------------------------------------------
# Environment-Specific Overrides
# (These can be further overridden in production/staging vars)
# ---------------------------------------------------------

# For production: strict validation
enable_strict_mode: true
skip_non_critical_checks: false
allow_experimental_features: false

# For production: full logging
debug_mode: false
verbose_mode: false
trace_mode: false