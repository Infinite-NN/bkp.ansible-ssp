---
# =============================================================================
# Build PCF Role - Default Variables
# =============================================================================
# These are DEFAULTS - override with group_vars, host_vars, or -e at CLI
# NO Jinja2 templating of undefined variables here!
# =============================================================================

# Build Environments & Paths
sandbox_path: "/sandbox/rhel810"
build_agent_home: "/home/bambooagent"
svn_base_url: "https://scm.forge.avaya.com/svnroot/aurora/branches"

# Log Configuration
log_dir: "/var/log/avaya_pipeline"
log_retention_days: 90

# Build Timeouts (seconds)
build_timeout: 10800           # 3 hours
kernel_timeout: 300             # 5 minutes
rpm_query_timeout: 60           # 1 minute

# Retry Configuration
default_retries: 3
retry_delay: 30

# Disk Space Requirements
min_disk_free_gb: 20

# RPM Size Thresholds
kernel_rpm_min_size_bytes: 1048576          # 1 MB
pcf_rpm_min_size_bytes: 2097152             # 2 MB
pcf_rpm_max_size_bytes: 104857600           # 100 MB

# Release Server
release_http_base: "http://10.133.43.170/releases"
release_http_timeout: 30

# Features
validate_kernel_signature: false
verify_rpm_checksum: true
generate_checksum_manifest: true
cleanup_old_artifacts: true

# CI/CD Metadata
ci_system: "Jenkins"
pipeline_name: "avaya-sbce-ssp-pcf"
build_initiator: "{{ lookup('env', 'BUILD_USER') | default('automated') }}"