---
# =============================================================================
# Build PCF - Validation Stage
# =============================================================================

- name: "✅ VALIDATE: Pre-build validation checks"
  block:
    - name: "Verify build server tools"
      stat:
        path: "{{ item }}"
      register: tool_check
      failed_when: not tool_check.stat.exists
      loop:
        - /usr/sbin/chroot
        - /bin/rpm
        - /usr/bin/rpmbuild
      tags: [validate]

    - name: "Check bambooBuildRpms script exists in sandbox"
      stat:
        path: /sandbox/rhel810/opt/pcf/icu/buildtools/bambooBuildRpms
      register: bamboo_script_check
      tags: [validate]

    - name: "Verify SVN repository sync"
      shell: |
        [ -d /opt/pcf ] && echo "✅ SVN repo found" || echo "❌ SVN repo missing"
      register: svn_check
      changed_when: false
      tags: [validate]

    - name: "Check available kernel versions in chroot"
      shell: |
        [ -d /sandbox/rhel810/usr/src/kernels ] && \
        ls -d /sandbox/rhel810/usr/src/kernels/*/build 2>/dev/null | wc -l || \
        echo "0"
      register: kernel_count
      changed_when: false
      tags: [validate]

    - name: "Log validation results"
      lineinfile:
        path: "{{ task_log_file }}"
        line: |
          [VALIDATE] ✅ PASSED - {{ ansible_date_time.iso8601 }}
            - Build tools: verified
            - chroot: /sandbox/rhel810
            - SVN repo: {{ svn_check.stdout }}
            - Available kernels: {{ kernel_count.stdout }}
        insertafter: "EOF"

  rescue:
    - name: "❌ Validation failed"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[VALIDATE] ❌ FAILED - {{ ansible_failed_task.name }}"
        insertafter: "EOF"

    - fail:
        msg: |
          ❌ Validation failed
          
          Checklist:
          - chroot environment: /sandbox/rhel810
          - bambooBuildRpms script
          - SVN source repository
          
          See {{ task_log_file }}
  tags: [validate, build_pcf]