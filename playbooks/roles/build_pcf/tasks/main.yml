---
# =============================================================================
# Build PCF Role - Main Task Orchestrator
# =============================================================================

- name: "🔧 BUILD_PCF: Role initialization"
  debug:
    msg: |
      ════════════════════════════════════════════════════════
      🔨 BUILD_PCF ROLE STARTING
      ════════════════════════════════════════════════════════
      Branch      : {{ build_pcf_branch }}
      Build No    : {{ build_pcf_build_no }}
      Module Ver  : {{ build_pcf_module_ver }}
      Environment : {{ build_pcf_environment }}
      Build Root  : {{ build_pcf_build_root }}
      ════════════════════════════════════════════════════════
  tags: [always]

# =============================================================================
# LOGGING SETUP
# =============================================================================

- name: "📝 Initialize build log"
  block:
    - name: "Create log directory"
      file:
        path: "{{ build_pcf_log | dirname }}"
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: "Initialize log file with header"
      copy:
        content: |
          ════════════════════════════════════════════════════════
          PCF BUILD LOG
          ════════════════════════════════════════════════════════
          Timestamp   : {{ ansible_date_time.iso8601 }}
          Host        : {{ inventory_hostname }}
          
          BUILD PARAMETERS:
            Branch        : {{ build_pcf_branch }}
            Build Number  : {{ build_pcf_build_no }}
            Module Ver    : {{ build_pcf_module_ver }}
            Environment   : {{ build_pcf_environment }}
            Build Root    : {{ build_pcf_build_root }}
          
          ════════════════════════════════════════════════════════
          TASK EXECUTION LOG:
          ════════════════════════════════════════════════════════
        dest: "{{ build_pcf_log }}"
        mode: "0644"
        force: yes

  rescue:
    - name: "❌ Failed to initialize log"
      fail:
        msg: "Cannot create log file at {{ build_pcf_log }}"
  tags: [always]

# =============================================================================
# COMPUTE DERIVED VARIABLES (do this AFTER variables are available)
# =============================================================================

- name: "🔧 Compute derived variables"
  set_fact:
    build_pcf_version: "{{ build_pcf_branch | regex_replace('_orion_int$', '') }}"
  tags: [always]

- name: "Display computed variables"
  debug:
    msg: |
      Computed Variables:
      - build_pcf_version: {{ build_pcf_version }}
  tags: [always]

# =============================================================================
# STAGE 1: PRE-FLIGHT VALIDATION
# =============================================================================

- name: "⚡ STAGE 1: Pre-Flight Validation"
  block:
    - name: "Check variables are not empty"
      assert:
        that:
          - build_pcf_branch | length > 0
          - build_pcf_build_no | string | length > 0
          - build_pcf_module_ver | length > 0
          - build_pcf_environment | length > 0
          - build_pcf_build_root | length > 0
        fail_msg: |
          ❌ Missing or empty required variables
          - build_pcf_branch: {{ build_pcf_branch }}
          - build_pcf_build_no: {{ build_pcf_build_no }}
          - build_pcf_module_ver: {{ build_pcf_module_ver }}
          - build_pcf_environment: {{ build_pcf_environment }}
          - build_pcf_build_root: {{ build_pcf_build_root }}
        success_msg: "✅ All variables present and non-empty"
      tags: [preflight]

    - name: "Validate branch format (10.2.1.X_orion_int)"
      assert:
        that:
          - build_pcf_branch is regex(branch_pattern)
        fail_msg: |
          ❌ Invalid branch format: {{ build_pcf_branch }}
          Expected: 10.2.1.X_orion_int (e.g., 10.2.1.0_orion_int)
          Pattern: {{ branch_pattern }}
        success_msg: "✅ Branch format valid: {{ build_pcf_branch }}"
      tags: [preflight]

    - name: "Validate build_no is numeric"
      assert:
        that:
          - build_pcf_build_no is regex(build_no_pattern)
        fail_msg: "❌ build_no must be numeric, got: {{ build_pcf_build_no }}"
        success_msg: "✅ Build number valid: {{ build_pcf_build_no }}"
      tags: [preflight]

    - name: "Validate module_ver format (X.X.X.X)"
      assert:
        that:
          - build_pcf_module_ver is regex(module_ver_pattern)
        fail_msg: |
          ❌ Invalid module version: {{ build_pcf_module_ver }}
          Expected format: X.X.X.X (e.g., 4.3.4.193953)
          Pattern: {{ module_ver_pattern }}
        success_msg: "✅ Module version format valid: {{ build_pcf_module_ver }}"
      tags: [preflight]

    - name: "Verify RHEL 8"
      assert:
        that:
          - ansible_os_family == "RedHat"
          - ansible_distribution_major_version == "8"
        fail_msg: |
          ❌ RHEL 8 required (found {{ ansible_distribution }} {{ ansible_distribution_version }})
        success_msg: "✅ RHEL {{ ansible_distribution_major_version }} detected"
      tags: [preflight]

    - name: "Check disk space (minimum 20GB)"
      shell: |
        df -BG {{ build_pcf_build_root | dirname }} | awk 'NR==2 {gsub("G", ""); print $4}'
      register: disk_available
      changed_when: false
      failed_when: (disk_available.stdout | int) < 20
      tags: [preflight]

    - name: "Create build directory"
      file:
        path: "{{ build_pcf_build_root }}"
        state: directory
        mode: "0755"
        owner: root
        group: root
      tags: [preflight]

    - name: "Log preflight success"
      lineinfile:
        path: "{{ build_pcf_log }}"
        line: |
          [PREFLIGHT] ✅ PASSED - {{ ansible_date_time.iso8601 }}
            - OS: RHEL {{ ansible_distribution_major_version }}
            - Disk: {{ disk_available.stdout }}GB available
            - Build root: {{ build_pcf_build_root }}
        insertafter: "TASK EXECUTION LOG:"
      tags: [preflight, always]

  rescue:
    - name: "❌ Preflight failed"
      lineinfile:
        path: "{{ build_pcf_log }}"
        line: "[PREFLIGHT] ❌ FAILED - {{ ansible_failed_task.name }}"
        insertafter: "TASK EXECUTION LOG:"

    - fail:
        msg: "Pre-flight validation failed. See {{ build_pcf_log }}"
  tags: [preflight, build_pcf]

# =============================================================================
# STAGE 2: INCLUDE DEPENDENT TASKS
# =============================================================================

- name: "⚡ STAGE 2: Validation Tasks"
  include_tasks: validate.yml
  vars:
    task_log_file: "{{ build_pcf_log }}"
  tags: [validate, build_pcf]

- name: "⚡ STAGE 2B: Kernel Preparation Tasks"
  include_tasks: kernel.yml
  vars:
    task_log_file: "{{ build_pcf_log }}"
  tags: [kernel, build_pcf]

# =============================================================================
# STAGE 3: MAIN BUILD
# =============================================================================

- name: "⚡ STAGE 3: Main PCF Build"
  include_tasks: build.yml
  vars:
    task_log_file: "{{ build_pcf_log }}"
  tags: [build, build_pcf]

# =============================================================================
# STAGE 4: PUBLISH
# =============================================================================

- name: "⚡ STAGE 4: Publish Build Artifacts"
  include_tasks: publish.yml
  vars:
    task_log_file: "{{ build_pcf_log }}"
  tags: [publish, build_pcf]

# =============================================================================
# FINAL: SUMMARY
# =============================================================================

- name: "✅ BUILD_PCF: Role completed successfully"
  debug:
    msg: |
      ════════════════════════════════════════════════════════
      ✅ PCF BUILD ROLE COMPLETED
      ════════════════════════════════════════════════════════
      Build Number : {{ build_pcf_build_no }}
      Branch       : {{ build_pcf_branch }}
      Version      : {{ build_pcf_version }}
      Log File     : {{ build_pcf_log }}
      ════════════════════════════════════════════════════════
  tags: [always]

- name: "Store build summary"
  set_fact:
    build_pcf_summary:
      build_number: "{{ build_pcf_build_no }}"
      branch: "{{ build_pcf_branch }}"
      version: "{{ build_pcf_version }}"
      status: "SUCCESS"
      timestamp: "{{ ansible_date_time.iso8601 }}"
  tags: [always]