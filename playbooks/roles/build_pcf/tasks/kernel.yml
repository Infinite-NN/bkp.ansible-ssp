---
# =============================================================================
# Build PCF - Kernel Preparation
# =============================================================================

- name: "🔧 KERNEL: Prepare kernel for build"
  block:
    - name: "Discover available kernel versions"
      shell: |
        find /sandbox/rhel810/usr/src/kernels -maxdepth 1 -type d -name '*' \
        | sed 's|.*/||' | sort -V | tail -1
      register: kernel_version
      changed_when: false
      tags: [kernel]

    - name: "Display selected kernel"
      debug:
        msg: "Kernel version: {{ kernel_version.stdout }}"
      tags: [kernel]

    - name: "Verify kernel build directory exists"
      stat:
        path: "/sandbox/rhel810/usr/src/kernels/{{ kernel_version.stdout }}/build"
      register: kernel_build_dir
      tags: [kernel]

    - name: "Fail if kernel build directory missing"
      fail:
        msg: "Kernel build directory not found: /sandbox/rhel810/usr/src/kernels/{{ kernel_version.stdout }}/build"
      when: not kernel_build_dir.stat.exists

    - name: "Set kernel path fact"
      set_fact:
        chroot_kernel_path: "/usr/src/kernels/{{ kernel_version.stdout }}"

    - name: "Log kernel preparation"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[KERNEL] ✅ Prepared - {{ chroot_kernel_path }} - {{ ansible_date_time.iso8601 }}"
        insertafter: "EOF"

  rescue:
    - name: "❌ Kernel preparation failed"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[KERNEL] ❌ FAILED - {{ ansible_failed_task.name }}"
        insertafter: "EOF"

    - fail:
        msg: "Kernel preparation failed. See {{ task_log_file }}"
  tags: [kernel, build_pcf]