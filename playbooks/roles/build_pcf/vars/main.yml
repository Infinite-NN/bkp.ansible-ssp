---
# =============================================================================
# Build PCF Role - Variables (Role-Internal Only)
# =============================================================================
# NOTE: Build parameters are passed FROM the playbook to the role.
# This file should NOT redefine or template those parameters.
# =============================================================================

# ---------------------------------------------------------
# VALIDATION PATTERNS (Regex) - Used in assertions
# ---------------------------------------------------------
branch_pattern: '^10\.2\.1\.[0-9]+_orion_int$'
version_pattern: '^10\.2\.1\.[0-9]+$'
module_ver_pattern: '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'
build_no_pattern: '^[0-9]+$'
rpm_name_pattern: '^pcf-module-.*\.rpm$'

# ---------------------------------------------------------
# DERIVED VARIABLES (computed from inputs)
# ---------------------------------------------------------
# Extract version from branch (e.g., 10.2.1.0_orion_int -> 10.2.1.0)
# NOTE: build_pcf_branch is passed by the playbook
build_pcf_version: "{{ build_pcf_branch | regex_replace('_orion_int$', '') }}"

# ---------------------------------------------------------
# FEATURE FLAGS
# ---------------------------------------------------------
fail_fast: true
max_consecutive_retries: 3
abort_on_role_failure: true