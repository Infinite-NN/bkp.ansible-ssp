---
# =============================================================
# Security Updates -- Download Security RPMs
# Downloads critical and important security updates
# =============================================================

- name: "[DOWN-SEC] Initialize security RPM download"
  block:
    - name: "Log download start"
      lineinfile:
        path: "{{ log_dir }}/pipeline_{{ ansible_date_time.date }}.log"
        line: "[SEC-DOWN][START] {{ ansible_date_time.iso8601 }}"
        insertafter: EOF

    - name: "Display download configuration"
      debug:
        msg: |
          ? Security RPM Download Configuration:
          +- BaseOS Repo     : {{ dnf_repo_baseos }}
          +- AppStream Repo  : {{ dnf_repo_appstream }}
          +- Destination     : {{ security_rpms_download_dir }}
          +- Only Security   : {{ security_only }}
          +- Timeout         : {{ download_timeout }}s

  tags:
    - sec_download
    - sec_download_init

---

- name: "[DOWN-SEC] Validate DNF repositories"
  block:
    - name: "List enabled repositories"
      command: dnf repolist --enabled
      register: enabled_repos
      changed_when: false

    - name: "Check BaseOS repository"
      assert:
        that:
          - enabled_repos.stdout is regex(dnf_repo_baseos)
        fail_msg: "BaseOS repository not found in enabled repos"
        success_msg: "? BaseOS repository enabled"

    - name: "Check AppStream repository"
      assert:
        that:
          - enabled_repos.stdout is regex(dnf_repo_appstream)
        fail_msg: "AppStream repository not found in enabled repos"
        success_msg: "? AppStream repository enabled"

  rescue:
    - debug:
        msg: "?  Repository validation warning (will attempt download)"

  tags:
    - sec_download
    - sec_download_validate

---

- name: "[DOWN-SEC] Clean DNF cache and rebuild metadata"
  block:
    - name: "Clean DNF cache"
      command: dnf clean all
      changed_when: true

    - name: "Rebuild DNF metadata"
      command: dnf makecache
      register: dnf_cache
      retries: 3
      delay: 15
      until: dnf_cache.rc == 0
      timeout: 300

  rescue:
    - debug:
        msg: "?  DNF cache rebuild issue (continuing)"

  tags:
    - sec_download
    - sec_download_cache

---

- name: "[DOWN-SEC] Download BaseOS security updates"
  block:
    - name: "Download BaseOS security RPMs"
      shell: |
        set -euo pipefail

        DEST="{{ security_rpms_download_dir }}/baseos"
        mkdir -p "$DEST"

        echo "?  Downloading BaseOS security RPMs..."
        
        dnf download \
          --security \
          --downloadonly \
          --destdir="$DEST" \
          --repo="{{ dnf_repo_baseos }}" \
          {% for pkg in security_update_exclude_packages %}
          --exclude="{{ pkg }}" \
          {% endfor %}
          -y 2>&1 | tail -15

        COUNT=$(find "$DEST" -name "*.rpm" -type f 2>/dev/null | wc -l || echo 0)
        echo "? BaseOS RPMs: $COUNT"
      args:
        executable: /bin/bash
      register: baseos_download
      timeout: "{{ download_timeout }}"
      retries: "{{ max_download_retries }}"
      delay: "{{ download_retry_delay }}"
      until: baseos_download.rc == 0
      failed_when: false

    - name: "Display BaseOS download result"
      debug:
        msg: "{{ baseos_download.stdout_lines | default([]) }}"

  rescue:
    - debug:
        msg: "?  BaseOS download encountered issues"

  tags:
    - sec_download
    - sec_download_baseos

---

- name: "[DOWN-SEC] Download AppStream security updates"
  block:
    - name: "Download AppStream security RPMs"
      shell: |
        set -euo pipefail

        DEST="{{ security_rpms_download_dir }}/appstream"
        mkdir -p "$DEST"

        echo "?  Downloading AppStream security RPMs..."
        
        dnf download \
          --security \
          --downloadonly \
          --destdir="$DEST" \
          --repo="{{ dnf_repo_appstream }}" \
          {% for pkg in security_update_exclude_packages %}
          --exclude="{{ pkg }}" \
          {% endfor %}
          -y 2>&1 | tail -15

        COUNT=$(find "$DEST" -name "*.rpm" -type f 2>/dev/null | wc -l || echo 0)
        echo "? AppStream RPMs: $COUNT"
      args:
        executable: /bin/bash
      register: appstream_download
      timeout: "{{ download_timeout }}"
      retries: "{{ max_download_retries }}"
      delay: "{{ download_retry_delay }}"
      until: appstream_download.rc == 0
      failed_when: false

    - name: "Display AppStream download result"
      debug:
        msg: "{{ appstream_download.stdout_lines | default([]) }}"

  rescue:
    - debug:
        msg: "?  AppStream download encountered issues"

  tags:
    - sec_download
    - sec_download_appstream

---

- name: "[DOWN-SEC] Clean up unwanted RPMs"
  block:
    - name: "Remove i686 (32-bit) RPMs"
      when: remove_i686_rpms | bool
      shell: |
        find "{{ security_rpms_download_dir }}" -name "*.i686.rpm" -delete 2>/dev/null
        COUNT=$(find "{{ security_rpms_download_dir }}" -name "*.rpm" -type f 2>/dev/null | wc -l || echo 0)
        echo "? i686 RPMs removed | Total: $COUNT"
      args:
        executable: /bin/bash
      changed_when: true

    - name: "Archive old security RPMs"
      when: archive_security_rpms | bool
      shell: |
        set -euo pipefail
        
        ARCHIVE_DIR="{{ security_rpms_archive_dir }}"
        mkdir -p "$ARCHIVE_DIR"

        find "{{ security_rpms_download_dir }}" -name "*.rpm" -type f \
          -exec cp {} "$ARCHIVE_DIR/" \; 2>/dev/null || true

        echo "? Security RPMs archived"
      args:
        executable: /bin/bash
      changed_when: true

  tags:
    - sec_download
    - sec_download_cleanup

---

- name: "[DOWN-SEC] Final download summary"
  block:
    - name: "Count downloaded security RPMs"
      find:
        paths: "{{ security_rpms_download_dir }}"
        patterns: "*.rpm"
        file_type: file
        recurse: yes
      register: final_security_rpms

    - name: "Display download summary"
      debug:
        msg: |
          ? SECURITY RPM DOWNLOAD COMPLETE
          
          ? Summary:
          +- Total RPMs    : {{ final_security_rpms.matched }}
          +- Location      : {{ security_rpms_download_dir }}
          +- Archive       : {{ security_rpms_archive_dir }}
          
          Next: Validate downloads...

    - name: "Log download completion"
      lineinfile:
        path: "{{ log_dir }}/pipeline_{{ ansible_date_time.date }}.log"
        line: "[SEC-DOWN][COMPLETE] {{ final_security_rpms.matched }} security RPM(s) downloaded"
        insertafter: EOF

  tags:
    - sec_download
    - sec_download_summary