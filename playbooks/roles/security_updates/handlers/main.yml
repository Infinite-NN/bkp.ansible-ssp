---
# =============================================================
# Security Updates Role — Handlers
# Triggered by notify: statements in tasks
# Manages post-update operations and notifications
# =============================================================

# ─────────────────────────────────────────────────────────
# Log Management Handlers
# ─────────────────────────────────────────────────────────

- name: rotate security update logs
  block:
    - name: "Check security update log size"
      stat:
        path: "{{ log_dir }}/security_updates_{{ ansible_date_time.date }}.log"
      register: sec_log_stat
      changed_when: false

    - name: "Rotate log if exceeds size limit"
      shell: |
        set -euo pipefail
        
        LOG="{{ log_dir }}/security_updates_{{ ansible_date_time.date }}.log"
        MAX_SIZE={{ log_max_size_mb | default(100) }}M
        
        if [ -f "$LOG" ]; then
          CURRENT_SIZE=$(stat -c%s "$LOG" 2>/dev/null || echo 0)
          MAX_SIZE_BYTES=$(( MAX_SIZE * 1024 * 1024 ))
          
          if [ "$CURRENT_SIZE" -gt "$MAX_SIZE_BYTES" ]; then
            ARCHIVE="${LOG}.$(date +%Y%m%d_%H%M%S).bak"
            mv "$LOG" "$ARCHIVE"
            gzip -f "$ARCHIVE" &
            echo "✅ Log rotated: $ARCHIVE.gz"
          fi
        fi
      args:
        executable: /bin/bash
      ignore_errors: yes

  listen: "rotate security logs"
  tags:
    - security_updates
    - handlers

---

- name: archive security reports
  block:
    - name: "Archive old security reports"
      shell: |
        set -euo pipefail
        
        REPORT_DIR="{{ security_report_dir }}"
        ARCHIVE_DIR="${REPORT_DIR}/archive"
        RETENTION_DAYS={{ report_retention_days | default(30) }}
        
        mkdir -p "$ARCHIVE_DIR"
        
        # Move reports older than retention period
        find "$REPORT_DIR" \
          -maxdepth 1 \
          -name "security_update_report*" \
          -mtime +$RETENTION_DAYS \
          -exec mv {} "$ARCHIVE_DIR/" \; 2>/dev/null || true
        
        echo "✅ Old reports archived"
      args:
        executable: /bin/bash
      changed_when: true
      ignore_errors: yes

  listen: "archive reports"
  tags:
    - security_updates
    - handlers

---

# ─────────────────────────────────────────────────────────
# Cleanup Handlers
# ─────────────────────────────────────────────────────────

- name: cleanup security rpms temp directory
  block:
    - name: "Remove temporary RPM staging directory"
      file:
        path: "/tmp/security_rpms_*"
        state: absent
      ignore_errors: yes

    - name: "Log cleanup completion"
      lineinfile:
        path: "{{ log_dir }}/pipeline_{{ ansible_date_time.date }}.log"
        line: "[SEC-CLEANUP] Temporary directories cleaned — {{ ansible_date_time.iso8601 }}"
        insertafter: EOF
        create: yes
      ignore_errors: yes

  listen: "cleanup temp dirs"
  tags:
    - security_updates
    - handlers

---

- name: cleanup failed downloads
  block:
    - name: "Remove incomplete RPM downloads"
      shell: |
        set -euo pipefail
        
        find "{{ security_rpms_download_dir }}" \
          -name "*.tmp" \
          -o -name "*.partial" \
          -o -name "*.incomplete" \
        | xargs rm -f 2>/dev/null || true
        
        echo "✅ Incomplete downloads removed"
      args:
        executable: /bin/bash
      changed_when: true
      ignore_errors: yes

  listen: "cleanup failed downloads"
  tags:
    - security_updates
    - handlers

---

# ─────────────────────────────────────────────────────────
# Service Management Handlers
# ─────────────────────────────────────────────────────────

- name: restart security update service
  block:
    - name: "Restart DNF service (if applicable)"
      systemd:
        name: "dnf-makecache.timer"
        state: restarted
      ignore_errors: yes

    - name: "Log service restart"
      lineinfile:
        path: "{{ log_dir }}/pipeline_{{ ansible_date_time.date }}.log"
        line: "[SEC-SERVICE] Security update service restarted — {{ ansible_date_time.iso8601 }}"
        insertafter: EOF
        create: yes
      ignore_errors: yes

  listen: "restart sec services"
  tags:
    - security_updates
    - handlers

---

# ─────────────────────────────────────────────────────────
# Notification Handlers
# ─────────────────────────────────────────────────────────

- name: send security update completion notification
  block:
    - name: "Log notification trigger"
      debug:
        msg: "📧 Security update completion notification triggered"

    - name: "Generate notification message"
      set_fact:
        notification_message: |
          Security Updates Completed Successfully
          ────────────────────────────────────
          Host       : {{ inventory_hostname }}
          Timestamp  : {{ ansible_date_time.iso8601 }}
          Environment: {{ environment | default('production') }}
          Status     : ✅ COMPLETE

    - name: "Log notification content"
      lineinfile:
        path: "{{ log_dir }}/pipeline_{{ ansible_date_time.date }}.log"
        line: "[SEC-NOTIFY] {{ notification_message | regex_replace('\n', ' | ') }}"
        insertafter: EOF
        create: yes
      ignore_errors: yes

  listen: "notify completion"
  when: send_notifications | default(false) | bool
  tags:
    - security_updates
    - handlers

---

- name: send security update failure notification
  block:
    - name: "Log failure notification"
      debug:
        msg: "📧 Security update failure notification triggered"

    - name: "Generate failure message"
      set_fact:
        failure_message: |
          Security Updates Failed
          ──────────────────────
          Host       : {{ inventory_hostname }}
          Timestamp  : {{ ansible_date_time.iso8601 }}
          Error      : {{ ansible_failed_result.msg | default('Unknown error') }}

    - name: "Log failure notification"
      lineinfile:
        path: "{{ log_dir }}/pipeline_{{ ansible_date_time.date }}.log"
        line: "[SEC-NOTIFY-FAIL] {{ failure_message | regex_replace('\n', ' | ') }}"
        insertafter: EOF
        create: yes
      ignore_errors: yes

  listen: "notify failure"
  when: send_notifications | default(false) | bool or notify_on_failure_only | default(true) | bool
  tags:
    - security_updates
    - handlers

---

# ─────────────────────────────────────────────────────────
# Report Generation Handlers
# ─────────────────────────────────────────────────────────

- name: finalize security report
  block:
    - name: "Add completion timestamp to report"
      shell: |
        set -euo pipefail
        
        REPORT="{{ security_report_dir }}/{{ security_report_filename }}"
        
        if [ -f "$REPORT" ]; then
          echo "" >> "$REPORT"
          echo "============================================================" >> "$REPORT"
          echo "Report Finalized: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$REPORT"
          echo "Host: $(hostname -f)" >> "$REPORT"
          echo "Build Number: {{ ansible_date_time.epoch }}" >> "$REPORT"
          echo "============================================================" >> "$REPORT"
          
          echo "✅ Report finalized"
        fi
      args:
        executable: /bin/bash
      changed_when: true
      ignore_errors: yes

  listen: "finalize report"
  tags:
    - security_updates
    - handlers

---

# ─────────────────────────────────────────────────────────
# Diagnostic Handlers
# ─────────────────────────────────────────────────────────

- name: collect failure diagnostics
  block:
    - name: "Capture system state on failure"
      shell: |
        set -euo pipefail
        
        DIAG_FILE="{{ log_dir }}/diagnostics_{{ ansible_date_time.iso8601_basic_short }}.txt"
        
        {
          echo "=== Security Updates Failure Diagnostics ==="
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Host: $(hostname -f)"
          echo ""
          echo "=== Environment ==="
          env | grep -E "(ANSIBLE|SCM|BUILD)" || true
          echo ""
          echo "=== DNF Status ==="
          dnf repolist --enabled 2>/dev/null | head -10 || echo "DNF unavailable"
          echo ""
          echo "=== Disk Usage ==="
          df -h {{ security_rpms_download_dir }} 2>/dev/null || true
          echo ""
          echo "=== Downloaded RPMs ==="
          find "{{ security_rpms_download_dir }}" -name "*.rpm" -type f 2>/dev/null | wc -l
          echo ""
          echo "=== Recent Logs ==="
          tail -50 "{{ log_dir }}"/*.log 2>/dev/null | head -100 || true
        } > "$DIAG_FILE"
        
        echo "✅ Diagnostics collected: $DIAG_FILE"
      args:
        executable: /bin/bash
      ignore_errors: yes

  listen: "collect diagnostics"
  when: collect_diagnostics_on_failure | default(true) | bool
  tags:
    - security_updates
    - handlers

---

# ─────────────────────────────────────────────────────────
# Monitoring & Alerting Handlers
# ─────────────────────────────────────────────────────────

- name: update security metrics
  block:
    - name: "Record security update metrics"
      shell: |
        set -euo pipefail
        
        METRICS_FILE="{{ log_dir }}/metrics_{{ ansible_date_time.date }}.json"
        
        RPM_COUNT=$(find "{{ security_rpms_download_dir }}" -name "*.rpm" -type f 2>/dev/null | wc -l || echo 0)
        BUILD_TIME=$(($(date +%s) - $(stat -c%Y {{ log_dir }} 2>/dev/null || echo 0)))
        
        cat > "$METRICS_FILE" <<EOF
        {
          "timestamp": "{{ ansible_date_time.iso8601 }}",
          "host": "{{ inventory_hostname }}",
          "environment": "{{ environment | default('unknown') }}",
          "rpms_downloaded": $RPM_COUNT,
          "build_time_seconds": $BUILD_TIME,
          "status": "complete"
        }
        EOF
        
        echo "✅ Metrics recorded"
      args:
        executable: /bin/bash
      changed_when: true
      ignore_errors: yes

  listen: "update metrics"
  tags:
    - security_updates
    - handlers

---

# ─────────────────────────────────────────────────────────
# Validation Handlers
# ─────────────────────────────────────────────────────────

- name: verify security updates integrity
  block:
    - name: "Verify all downloaded RPMs"
      shell: |
        set -euo pipefail
        
        ERRORS=0
        COUNT=0
        
        for rpm in $(find "{{ security_rpms_download_dir }}" -name "*.rpm" -type f); do
          if file "$rpm" | grep -q "RPM"; then
            COUNT=$((COUNT + 1))
          else
            ERRORS=$((ERRORS + 1))
            echo "⚠️  Invalid RPM: $rpm"
          fi
        done
        
        if [ $ERRORS -eq 0 ]; then
          echo "✅ All $COUNT RPMs verified"
        else
          echo "⚠️  Found $ERRORS invalid RPM(s)"
        fi
      args:
        executable: /bin/bash
      changed_when: false
      ignore_errors: yes

  listen: "verify integrity"
  tags:
    - security_updates
    - handlers