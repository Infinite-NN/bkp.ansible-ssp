---
# =============================================================
# Post-Reboot — IPCS Service Startup and Verification
# =============================================================

- name: "[IPCS] Define IPCS service variables"
  set_fact:
    ipcs_script: "{{ lookup('env', 'IPCS_SCRIPT') | default('/usr/local/ipcs/bin/IPCS.sh') }}"
    ipcs_startup_timeout: 600  # 10 minutes
    ipcs_status_retries: 60
    ipcs_status_delay: 10
  tags:
    - ipcs
    - always

- name: "[IPCS] Verify IPCS script exists"
  stat:
    path: "{{ ipcs_script }}"
  register: ipcs_script_stat

- name: "Fail if IPCS script missing"
  fail:
    msg: |
      ❌ IPCS startup script not found at: {{ ipcs_script }}
      
      Expected script locations:
      - /usr/local/ipcs/bin/IPCS.sh
      - /opt/IPCS/bin/IPCS.sh
      - /root/IPCS/bin/IPCS.sh
      
      Troubleshooting:
      - Check SSP installation completed
      - Verify IPCS extraction: ls -la /opt/ssp/
      - Check script permissions: ls -la {{ ipcs_script }}
  when: not ipcs_script_stat.exists
  tags:
    - ipcs
    - ipcs_startup

- name: "[IPCS] Stop IPCS if running"
  block:
    - name: "Attempt to stop IPCS gracefully"
      shell: |
        set -euo pipefail
        
        if [ ! -x "{{ ipcs_script }}" ]; then
          echo "Script not executable, attempting to make it so..."
          chmod +x "{{ ipcs_script }}" || true
        fi
        
        echo "Stopping IPCS (if running)..."
        "{{ ipcs_script }}" stop 2>&1 || true
        
        sleep 5
        
        # Kill any remaining IPCS processes
        pkill -f "java.*IPCS" || true
        pkill -f "ipcs" || true
        
        sleep 2
        
        echo "✅ IPCS stop complete"
      args:
        executable: /bin/bash
      register: ipcs_stop_result
      changed_when: true
      ignore_errors: yes

    - name: "Log IPCS stop result"
      debug:
        msg: "{{ ipcs_stop_result.stdout }}"

  rescue:
    - debug:
        msg: "⚠️  IPCS stop encountered issues (may be normal if not running)"

  tags:
    - ipcs
    - ipcs_startup

- name: "[IPCS] Start IPCS service"
  block:
    - name: "Make IPCS script executable"
      file:
        path: "{{ ipcs_script }}"
        mode: '0755'

    - name: "Start IPCS service"
      shell: |
        set -euo pipefail

        echo "Starting IPCS service..."
        echo "Script: {{ ipcs_script }}"
        
        # Start IPCS with timeout
        if ! timeout {{ ipcs_startup_timeout }} "{{ ipcs_script }}" start 2>&1; then
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 124 ]; then
            echo "⚠️  IPCS start timed out (may still be starting)"
          else
            echo "❌ IPCS start failed with code: $EXIT_CODE"
            exit $EXIT_CODE
          fi
        fi

        echo "✅ IPCS start command completed"
      args:
        executable: /bin/bash
      register: ipcs_start_result
      timeout: "{{ ipcs_startup_timeout + 60 }}"
      changed_when: true

    - name: "Log IPCS start output"
      debug:
        msg: "{{ ipcs_start_result.stdout }}"

    - name: "Wait for IPCS to initialize"
      pause:
        seconds: 30

  rescue:
    - name: "Log IPCS start failure"
      lineinfile:
        path: "{{ log_dir }}/post_reboot_{{ ansible_date_time.date }}.log"
        line: "[IPCS][START_FAILED] {{ ansible_failed_result.msg | default('Unknown error') }} — {{ ansible_date_time.iso8601 }}"
        create: yes
        insertafter: EOF
      ignore_errors: yes

    - fail:
        msg: "IPCS service failed to start — manual intervention required"

  tags:
    - ipcs
    - ipcs_startup

- name: "[IPCS] Verify GUI service is UP"
  block:
    - name: "Poll for GUI service status"
      shell: |
        set -euo pipefail
        
        # Run status check
        STATUS_OUTPUT=$("{{ ipcs_script }}" status 2>&1 || echo "")
        
        # Look for GUI UP indicator
        if echo "$STATUS_OUTPUT" | grep -qiE "(GUI.*UP|UI.*UP|WEB.*UP)"; then
          echo "FOUND_GUI_UP"
          echo "$STATUS_OUTPUT" | head -20
          exit 0
        else
          echo "GUI not yet UP"
          echo "$STATUS_OUTPUT" | head -10
          exit 1
        fi
      args:
        executable: /bin/bash
      register: gui_check
      retries: "{{ ipcs_status_retries }}"
      delay: "{{ ipcs_status_delay }}"
      until: gui_check.rc == 0
      timeout: "{{ (ipcs_status_retries * ipcs_status_delay) + 60 }}"
      changed_when: false

    - name: "Confirm GUI status found"
      assert:
        that:
          - "'FOUND_GUI_UP' in gui_check.stdout"
        fail_msg: |
          ❌ GUI service did not come UP after {{ ipcs_status_retries }} retries
          (waited {{ ipcs_status_retries * ipcs_status_delay }} seconds)
        success_msg: "✅ GUI service confirmed UP"

  rescue:
    - name: "Collect IPCS diagnostics on failure"
      shell: |
        echo "=== IPCS STATUS (failure state) ==="
        "{{ ipcs_script }}" status 2>&1 || echo "Status check failed"
        echo ""
        echo "=== PROCESS LIST ==="
        ps aux | grep -iE "java|ipcs|gui" | head -10
        echo ""
        echo "=== SYSTEM LOAD ==="
        uptime
        echo ""
        echo "=== DISK USAGE ==="
        df -h /opt
      register: ipcs_diag
      ignore_errors: yes

    - name: "Log IPCS diagnostics"
      lineinfile:
        path: "{{ log_dir }}/post_reboot_{{ ansible_date_time.date }}.log"
        line: |
          [IPCS][DIAGNOSTICS]
          {{ ipcs_diag.stdout | default('No diagnostics available') | indent(2) }}
        insertafter: EOF
      ignore_errors: yes

    - fail:
        msg: |
          ❌ IPCS GUI service failed to start
          
          Troubleshooting steps:
          1. Check IPCS logs: tail -100 /opt/ssp/logs/*.log
          2. Check system resources: free -h && df -h
          3. Verify Java runtime: java -version
          4. Manual start: {{ ipcs_script }} start
          
          See {{ log_dir }}/post_reboot_{{ ansible_date_time.date }}.log for details

  tags:
    - ipcs
    - ipcs_verify

- name: "[IPCS] Get full system status"
  block:
    - name: "Query full IPCS status"
      shell: |
        set -euo pipefail
        "{{ ipcs_script }}" status 2>&1
      args:
        executable: /bin/bash
      register: full_ipcs_status
      changed_when: false

    - name: "Display full IPCS status"
      debug:
        msg: |
          📊 Full IPCS Status:
          
          {{ full_ipcs_status.stdout }}

    - name: "Parse critical services status"
      shell: |
        OUTPUT="{{ full_ipcs_status.stdout }}"
        
        # Count UP vs DOWN services
        UP_COUNT=$(echo "$OUTPUT" | grep -ci "UP" || echo "0")
        DOWN_COUNT=$(echo "$OUTPUT" | grep -ci "DOWN" || echo "0")
        
        echo "UP: $UP_COUNT, DOWN: $DOWN_COUNT"
      args:
        executable: /bin/bash
      register: service_count
      changed_when: false

    - name: "Assert all critical services are UP"
      assert:
        that:
          - "'UP' in full_ipcs_status.stdout or 'up' in full_ipcs_status.stdout"
          - "'DOWN' not in full_ipcs_status.stdout or full_ipcs_status.stdout | default('') | length < 50
        fail_msg: |
          ⚠️  Some IPCS services may not be fully UP
          Status output: {{ full_ipcs_status.stdout }}
        success_msg: "✅ IPCS services confirmed UP"

    - name: "Log IPCS startup completion"
      lineinfile:
        path: "{{ log_dir }}/post_reboot_{{ ansible_date_time.date }}.log"
        line: |
          [IPCS][UP] All IPCS services started successfully — {{ ansible_date_time.iso8601 }}
          {{ service_count.stdout }}
        insertafter: EOF

  rescue:
    - name: "Log IPCS status query warning"
      lineinline:
        path: "{{ log_dir }}/post_reboot_{{ ansible_date_time.date }}.log"
        line: "[IPCS][STATUS_WARN] Could not fully verify service status — {{ ansible_date_time.iso8601 }}"
        insertafter: EOF
      ignore_errors: yes

    - debug:
        msg: "⚠️  Could not retrieve full IPCS status (non-critical)"

  tags:
    - ipcs
    - ipcs_verify

- name: "[IPCS] Completion summary"
  debug:
    msg: |
      ✅ IPCS STARTUP COMPLETE
      
      📋 Services:
      ├─ GUI           : ✅ UP
      ├─ Web Interface : ✅
      ├─ Java Runtime  : ✅
      └─ Status        : Ready
      
      Proceed to next post-reboot phase...
  tags:
    - ipcs
    - always