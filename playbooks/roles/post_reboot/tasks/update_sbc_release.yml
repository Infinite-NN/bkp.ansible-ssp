---
# =============================================================
# Post-Reboot -- Update sbc-release Files
# Updates version numbers, dates, kernel, and SSP directory names
# Calls sub-task: _update_single_sbc_release.yml
# =============================================================

- name: "[RELEASE] Initialize sbc-release update phase"
  block:
    - name: "Log update start"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: "[RELEASE][START] {{ ansible_date_time.iso8601 }}"
        create: yes

    - name: "Display configuration"
      debug:
        msg: |
          ? sbc-release Update Configuration:
          +- SSP Path: {{ ssp_path }}
          +- Search  : {{ ssp_path }}/{{ ssp_new_rpms_dir }}/10.2.1.*
          +- Updates : SSP_NUMBER, SSP_OS_Update_Date, sbc=, kernel=

  tags:
    - release
    - release_init

---

- name: "[RELEASE] Validate prerequisites"
  block:
    - name: "Verify ssp_path is defined"
      assert:
        that:
          - ssp_path is defined
          - ssp_path | length > 0
        fail_msg: "ssp_path is not defined"
        success_msg: "? ssp_path validated"

    - name: "Verify SSP exists"
      stat:
        path: "{{ ssp_path }}"
      register: ssp_stat
      failed_when: not ssp_stat.stat.exists

  rescue:
    - fail:
        msg: "Prerequisite validation failed -- {{ ansible_failed_result.msg }}"

  tags:
    - release
    - release_validate

---

- name: "[RELEASE] Calculate update values"
  block:
    - name: "Get today's date (DD/MM/YYYY format)"
      shell: date '+%d/%m/%Y'
      register: today_date
      changed_when: false

    - name: "Calculate next month SSP name (01-MonYYYY format)"
      shell: |
        YEAR=$(date +%Y)
        MONTH=$(date +%-m)
        NEXT_MONTH=$(( MONTH + 1 ))
        NEXT_YEAR=$YEAR
        
        if [ "$NEXT_MONTH" -gt 12 ]; then
          NEXT_MONTH=1
          NEXT_YEAR=$(( YEAR + 1 ))
        fi
        
        # Format: 01-MonYYYY (e.g., 01-Jul2026)
        date -d "${NEXT_YEAR}-${NEXT_MONTH}-01" '+%d-%b%Y' | tr '[:upper:]' '[:lower:]'
      args:
        executable: /bin/bash
      register: next_month_name
      changed_when: false

    - name: "Detect kernel version from downloaded RPMs"
      shell: |
        set -euo pipefail
        
        # Search for kernel RPM in newRPMs
        KERNEL_RPM=$(find \
          "{{ ssp_path }}/{{ ssp_new_rpms_dir }}" \
          -maxdepth 4 \
          -type f \
          -name "kernel-[0-9]*.rpm" \
          2>/dev/null | sort -V | tail -1)
        
        if [ -n "$KERNEL_RPM" ]; then
          # Extract version from RPM metadata
          rpm -qp --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' "$KERNEL_RPM" 2>/dev/null || uname -r
        else
          # Fallback to current kernel
          uname -r
        fi
      args:
        executable: /bin/bash
      register: kernel_version
      changed_when: false

    - name: "Display calculated values"
      debug:
        msg: |
          ? Update Values:
          +- Today's Date    : {{ today_date.stdout | trim }}
          +- Next Month Name : {{ next_month_name.stdout | trim }}
          +- Kernel Version  : {{ kernel_version.stdout | trim }}

  rescue:
    - fail:
        msg: "Could not calculate update values -- {{ ansible_failed_result.msg }}"

  tags:
    - release
    - release_calculate

---

- name: "[RELEASE] Find version directories"
  block:
    - name: "Search for 10.2.1.* directories in newRPMs"
      find:
        paths: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}"
        patterns: "10.2.1.*"
        file_type: directory
        recurse: no
      register: version_dirs

    - name: "Display found directories"
      debug:
        msg: |
          ? Version Directories Found: {{ version_dirs.matched }}
          {{ version_dirs.files | map(attribute='path') | map('basename') | list | join('\n') }}

    - name: "Warn if no directories found"
      debug:
        msg: "?  No version directories found -- nothing to update"
      when: version_dirs.matched == 0

  tags:
    - release
    - release_discover

---

- name: "[RELEASE] Update each sbc-release file"
  block:
    - name: "Include sub-task for each version directory"
      include_tasks: _update_single_sbc_release.yml
      loop: "{{ version_dirs.files }}"
      loop_control:
        loop_var: rel_dir_item
        label: "{{ rel_dir_item.path | basename }}"
      when: version_dirs.matched > 0

  rescue:
    - fail:
        msg: "sbc-release update failed -- {{ ansible_failed_result.msg }}"

  tags:
    - release
    - release_update

---

- name: "[RELEASE] Final validation"
  block:
    - name: "Count updated sbc-release files"
      find:
        paths: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}"
        names: "sbc-release"
        file_type: file
        recurse: yes
      register: updated_sbc_releases

    - name: "Display completion summary"
      debug:
        msg: |
          ? sbc-release UPDATE COMPLETE
          
          ? Summary:
          +- Files Updated : {{ updated_sbc_releases.matched }}
          +- Date Updated  : {{ today_date.stdout | trim }}
          +- Kernel Updated: {{ kernel_version.stdout | trim }}
          +- Next Month    : {{ next_month_name.stdout | trim }}
          
          Next: Update PCF modules...

    - name: "Log completion"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: |
          [RELEASE][SUCCESS] {{ ansible_date_time.iso8601 }}
          Files Updated: {{ updated_sbc_releases.matched }}
          Date: {{ today_date.stdout | trim }} | Kernel: {{ kernel_version.stdout | trim }}
        create: yes

  tags:
    - release
    - release_summary

---

- name: "[RELEASE] Phase completion"
  lineinfile:
    path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
    line: "[RELEASE][END] {{ ansible_date_time.iso8601 }}"
    create: yes
  ignore_errors: yes
  tags:
    - release
    - always