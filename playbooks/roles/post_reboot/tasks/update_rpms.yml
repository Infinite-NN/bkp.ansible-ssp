---
# =============================================================
# Post-Reboot — Update RPMs in SSP Structure
# Copies downloaded security RPMs into SSP newRPMs directories
# =============================================================

- name: "[RPM-UPDATE] Initialize RPM update phase"
  block:
    - name: "Log RPM update start"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: "[RPM-UPDATE][START] {{ ansible_date_time.iso8601 }}"
        create: yes

    - name: "Display RPM update configuration"
      debug:
        msg: |
          📦 RPM Update Configuration:
          ├─ SSP Path        : {{ ssp_path | default('(to be discovered)') }}
          ├─ BaseOS Source   : {{ repo_baseos_path }}
          ├─ AppStream Source: {{ repo_appstream_path }}
          └─ Timeout        : {{ post_reboot_timeout_rpm_ops }}s

  tags:
    - rpm_update
    - rpm_update_init

---

- name: "[RPM-UPDATE] Validate prerequisites"
  block:
    - name: "Verify ssp_path is set"
      assert:
        that:
          - ssp_path is defined
          - ssp_path | length > 0
        fail_msg: "❌ ssp_path is not defined or empty"
        success_msg: "✅ ssp_path defined: {{ ssp_path }}"

    - name: "Verify SSP installation exists"
      stat:
        path: "{{ ssp_path }}"
      register: ssp_path_stat
      failed_when: not ssp_path_stat.stat.exists

    - name: "Verify repository sources exist"
      stat:
        path: "{{ item }}"
      register: repo_stat
      loop:
        - "{{ repo_baseos_path }}"
        - "{{ repo_appstream_path }}"
      failed_when: not repo_stat.stat.exists

  rescue:
    - fail:
        msg: "Prerequisite validation failed — {{ ansible_failed_result.msg }}"

  tags:
    - rpm_update
    - rpm_update_validate

---

- name: "[RPM-UPDATE] Create SSP newRPMs directory structure"
  block:
    - name: "Create newRPMs base directory"
      file:
        path: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}"
        state: directory
        mode: '0755'
        recurse: yes

    - name: "Create repository package directories"
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        recurse: yes
      loop:
        - "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/BaseOS/Packages"
        - "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/AppStream/Packages"

    - name: "Create archive directories"
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        recurse: yes
      loop:
        - "{{ repo_archive_base }}/BaseOS"
        - "{{ repo_archive_base }}/AppStream"

    - name: "Display created directory structure"
      debug:
        msg: |
          ✅ Directory Structure Created:
          ├─ {{ ssp_path }}/{{ ssp_new_rpms_dir }}/BaseOS/Packages
          ├─ {{ ssp_path }}/{{ ssp_new_rpms_dir }}/AppStream/Packages
          ├─ {{ repo_archive_base }}/BaseOS
          └─ {{ repo_archive_base }}/AppStream

  rescue:
    - fail:
        msg: "Cannot create RPM directory structure — {{ ansible_failed_result.msg }}"

  tags:
    - rpm_update
    - rpm_update_dirs

---

- name: "[RPM-UPDATE] Process BaseOS RPMs"
  block:
    - name: "Find BaseOS RPMs"
      find:
        paths: "{{ repo_baseos_path }}"
        patterns: "*.rpm"
        file_type: file
        recurse: yes
      register: baseos_rpms

    - name: "Display BaseOS RPM count"
      debug:
        msg: "🔍 Found {{ baseos_rpms.matched }} BaseOS RPMs to process"

    - name: "Copy BaseOS RPMs to SSP newRPMs"
      shell: |
        set -euo pipefail

        SRC_DIR="{{ repo_baseos_path }}"
        DST_DIR="{{ ssp_path }}/{{ ssp_new_rpms_dir }}/BaseOS/Packages"
        ARCHIVE_DIR="{{ repo_archive_base }}/BaseOS"

        echo "Copying BaseOS RPMs..."
        
        count=0
        while IFS= read -r rpm_file; do
          # Extract filename
          rpm_name=$(basename "$rpm_file")
          
          # Copy to SSP newRPMs
          cp -f "$rpm_file" "$DST_DIR/$rpm_name"
          
          # Copy to archive
          cp -f "$rpm_file" "$ARCHIVE_DIR/$rpm_name" 2>/dev/null || true
          
          count=$((count + 1))
          [ $((count % 10)) -eq 0 ] && echo "  Processed: $count"
        done < <(find "$SRC_DIR" -name "*.rpm" -type f)

        echo "✅ Total BaseOS RPMs copied: $count"
      args:
        executable: /bin/bash
      register: baseos_copy
      timeout: "{{ post_reboot_timeout_rpm_ops }}"
      changed_when: baseos_rpms.matched > 0

    - name: "Display BaseOS copy result"
      debug:
        msg: "{{ baseos_copy.stdout_lines }}"

  rescue:
    - name: "Log BaseOS copy failure"
      debug:
        msg: "BaseOS RPM copy failed — {{ ansible_failed_result.msg }}"
      when: fail_on_error | default(true) | bool

    - fail:
        msg: "BaseOS RPM processing failed"
      when: fail_on_error | default(true) | bool

  tags:
    - rpm_update
    - rpm_update_baseos

---

- name: "[RPM-UPDATE] Process AppStream RPMs"
  block:
    - name: "Find AppStream RPMs"
      find:
        paths: "{{ repo_appstream_path }}"
        patterns: "*.rpm"
        file_type: file
        recurse: yes
      register: appstream_rpms

    - name: "Display AppStream RPM count"
      debug:
        msg: "🔍 Found {{ appstream_rpms.matched }} AppStream RPMs to process"

    - name: "Copy AppStream RPMs to SSP newRPMs"
      shell: |
        set -euo pipefail

        SRC_DIR="{{ repo_appstream_path }}"
        DST_DIR="{{ ssp_path }}/{{ ssp_new_rpms_dir }}/AppStream/Packages"
        ARCHIVE_DIR="{{ repo_archive_base }}/AppStream"

        echo "Copying AppStream RPMs..."
        
        count=0
        while IFS= read -r rpm_file; do
          rpm_name=$(basename "$rpm_file")
          
          cp -f "$rpm_file" "$DST_DIR/$rpm_name"
          cp -f "$rpm_file" "$ARCHIVE_DIR/$rpm_name" 2>/dev/null || true
          
          count=$((count + 1))
          [ $((count % 10)) -eq 0 ] && echo "  Processed: $count"
        done < <(find "$SRC_DIR" -name "*.rpm" -type f)

        echo "✅ Total AppStream RPMs copied: $count"
      args:
        executable: /bin/bash
      register: appstream_copy
      timeout: "{{ post_reboot_timeout_rpm_ops }}"
      changed_when: appstream_rpms.matched > 0

    - name: "Display AppStream copy result"
      debug:
        msg: "{{ appstream_copy.stdout_lines }}"

  rescue:
    - name: "Log AppStream copy failure"
      debug:
        msg: "AppStream RPM copy failed — {{ ansible_failed_result.msg }}"

    - fail:
        msg: "AppStream RPM processing failed"
      when: fail_on_error | default(true) | bool

  tags:
    - rpm_update
    - rpm_update_appstream

---

- name: "[RPM-UPDATE] Rebuild InstallRPMsList"
  block:
    - name: "Generate InstallRPMsList from copied RPMs"
      shell: |
        set -euo pipefail

        OUT="{{ ssp_path }}/InstallRPMsList"
        
        echo "Rebuilding InstallRPMsList..."
        
        {
          find "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/BaseOS/Packages" -name "*.rpm" -type f 2>/dev/null || true
          find "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/AppStream/Packages" -name "*.rpm" -type f 2>/dev/null || true
        } | xargs -r -I{} basename {} | sort -u > "$OUT"

        LINE_COUNT=$(wc -l < "$OUT")
        
        if [ "$LINE_COUNT" -ge "{{ min_rpm_count_success | default(10) }}" ]; then
          echo "✅ InstallRPMsList rebuilt: $LINE_COUNT entries"
        else
          echo "⚠️  Low RPM count: $LINE_COUNT (minimum: {{ min_rpm_count_success | default(10) }})"
        fi
      args:
        executable: /bin/bash
      register: list_rebuild
      changed_when: true

    - name: "Display rebuild result"
      debug:
        msg: "{{ list_rebuild.stdout }}"

    - name: "Verify InstallRPMsList exists"
      stat:
        path: "{{ ssp_path }}/InstallRPMsList"
      register: rpm_list_stat
      failed_when: not rpm_list_stat.stat.exists

  rescue:
    - fail:
        msg: "InstallRPMsList rebuild failed — {{ ansible_failed_result.msg }}"

  tags:
    - rpm_update
    - rpm_update_list

---

- name: "[RPM-UPDATE] Update sbc-ssp-details with security info"
  block:
    - name: "Check if security report exists"
      stat:
        path: "{{ report_file }}"
      register: report_stat

    - name: "Backup current sbc-ssp-details"
      copy:
        src: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/sbc-ssp-details"
        dest: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/sbc-ssp-details.backup"
        remote_src: yes
      when: report_stat.stat.exists
      ignore_errors: yes

    - name: "Copy security report to sbc-ssp-details"
      copy:
        src: "{{ report_file }}"
        dest: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/sbc-ssp-details"
        remote_src: yes
        mode: '0644'
      when: report_stat.stat.exists

    - name: "Sort sbc-ssp-details by package name"
      shell: |
        FILE="{{ ssp_path }}/{{ ssp_new_rpms_dir }}/sbc-ssp-details"
        
        if [ -f "$FILE" ]; then
          sort -t'|' -k1,1 "$FILE" -o "$FILE"
          echo "✅ sbc-ssp-details sorted"
        fi
      args:
        executable: /bin/bash
      when: report_stat.stat.exists
      ignore_errors: yes

  rescue:
    - debug:
        msg: "⚠️  sbc-ssp-details update skipped (report may not exist)"

  tags:
    - rpm_update
    - rpm_update_details

---

- name: "[RPM-UPDATE] Final summary and logging"
  block:
    - name: "Count final RPMs in newRPMs"
      shell: |
        BASEOS_COUNT=$(find "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/BaseOS/Packages" -name "*.rpm" 2>/dev/null | wc -l)
        APPSTREAM_COUNT=$(find "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/AppStream/Packages" -name "*.rpm" 2>/dev/null | wc -l)
        TOTAL=$((BASEOS_COUNT + APPSTREAM_COUNT))
        
        echo "BaseOS   : $BASEOS_COUNT"
        echo "AppStream: $APPSTREAM_COUNT"
        echo "Total    : $TOTAL"
      args:
        executable: /bin/bash
      register: rpm_counts
      changed_when: false

    - name: "Display RPM summary"
      debug:
        msg: |
          ✅ RPM UPDATE COMPLETE
          
          📦 RPM Summary:
          {{ rpm_counts.stdout }}
          
          ✅ Status: Ready for SSP repackaging

    - name: "Log RPM update success"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: |
          [RPM-UPDATE][SUCCESS] {{ ansible_date_time.iso8601 }}
          {{ rpm_counts.stdout | regex_replace('\n', '\n          ') }}
        create: yes

  rescue:
    - fail:
        msg: "RPM update final summary failed"

  tags:
    - rpm_update
    - rpm_update_summary