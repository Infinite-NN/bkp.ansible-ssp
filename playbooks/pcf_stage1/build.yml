---
# =============================================================================
# PCF Build - Stage 1 - Compilation Only
# =============================================================================
# Purpose: Compile PCF module from source code
# Input:   branch, build_no, module_ver (via -e flags)
# Output:  PCF RPM in /root/releases
# =============================================================================

- name: "PCF Build - Compilation Stage"
  hosts: buildserver
  become: yes
  gather_facts: yes

  # ===========================================================================
  # VARIABLES - Simple, direct assignments
  # ===========================================================================
  vars:
    # Parameters passed via command line (-e flag)
    pcf_branch: "{{ branch }}"
    pcf_build_no: "{{ build_no }}"
    pcf_module_ver: "{{ module_ver }}"
    
    # Source code paths (SVN repos)
    svn_base: "/var/lib/jenkins/SVN_repos"
    pcf_source: "/var/lib/jenkins/SVN_repos/{{ pcf_branch }}"
    
    # Computed paths (based on above)
    build_root: "/tmp/pcf_build_{{ pcf_build_no }}"
    releases_dir: "/root/releases"
    log_file: "/var/log/pcf_build_{{ pcf_build_no }}.log"

  # ===========================================================================
  # TASKS - Build PCF
  # ===========================================================================
  tasks:

    # =========================================================================
    # STEP 1: Validate Input Parameters
    # =========================================================================
    - name: "Step 1️⃣ - Validate Input Parameters"
      block:
        - name: "Check branch is provided"
          assert:
            that:
              - pcf_branch is defined
              - pcf_branch | length > 0
            fail_msg: "❌ branch not provided"
            success_msg: "✅ branch: {{ pcf_branch }}"

        - name: "Check build_no is provided"
          assert:
            that:
              - pcf_build_no is defined
              - pcf_build_no | length > 0
            fail_msg: "❌ build_no not provided"
            success_msg: "✅ build_no: {{ pcf_build_no }}"

        - name: "Check module_ver is provided"
          assert:
            that:
              - pcf_module_ver is defined
              - pcf_module_ver | length > 0
            fail_msg: "❌ module_ver not provided"
            success_msg: "✅ module_ver: {{ pcf_module_ver }}"

      tags: [validate]

    # =========================================================================
    # STEP 2: Display Build Configuration
    # =========================================================================
    - name: "Step 2️⃣ - Display Build Configuration"
      debug:
        msg: |
          ════════════════════════════════════════════════════════
          🔨 PCF BUILD CONFIGURATION
          ════════════════════════════════════════════════════════
          Branch          : {{ pcf_branch }}
          Build Number    : {{ pcf_build_no }}
          Module Version  : {{ pcf_module_ver }}
          
          Source Code     : {{ pcf_source }}
          Build Root      : {{ build_root }}
          Releases Dir    : {{ releases_dir }}
          Log File        : {{ log_file }}
          
          Build Host      : {{ inventory_hostname }}
          Build User      : root
          Build Date      : {{ ansible_date_time.iso8601 }}
          ════════════════════════════════════════════════════════
      tags: [always]

    # =========================================================================
    # STEP 3: Verify System Requirements
    # =========================================================================
    - name: "Step 3️⃣ - Verify System Requirements"
      block:
        - name: "Check RHEL version"
          assert:
            that:
              - ansible_distribution == "RedHat" or ansible_distribution == "CentOS"
              - ansible_distribution_major_version == "8"
            fail_msg: "❌ RHEL 8 required. Found: {{ ansible_distribution }} {{ ansible_distribution_version }}"
            success_msg: "✅ RHEL {{ ansible_distribution_major_version }} detected"

        - name: "Check required tools exist"
          stat:
            path: "{{ item }}"
          register: tool_check
          failed_when: not tool_check.stat.exists
          loop:
            - /usr/sbin/chroot
            - /usr/bin/rpm
            - /usr/bin/rsync

        - name: "Check disk space (minimum 20GB)"
          shell: df -BG / | awk 'NR==2 {gsub("G", ""); print $4}'
          register: disk_free
          changed_when: false
          failed_when: (disk_free.stdout | int) < 20

        - name: "Display disk space"
          debug:
            msg: "✅ Disk space: {{ disk_free.stdout }}GB available (required: 20GB)"

      tags: [validate]

    # =========================================================================
    # STEP 4: Create Build Environment
    # =========================================================================
    - name: "Step 4️⃣ - Create Build Environment"
      block:
        - name: "Create build directory"
          file:
            path: "{{ build_root }}"
            state: directory
            mode: "0755"

        - name: "Create releases directory"
          file:
            path: "{{ releases_dir }}"
            state: directory
            mode: "0755"

        - name: "Create log directory"
          file:
            path: "{{ log_file | dirname }}"
            state: directory
            mode: "0755"

        - name: "Initialize log file"
          copy:
            content: |
              ════════════════════════════════════════════════════════
              PCF BUILD LOG
              ════════════════════════════════════════════════════════
              Build Number    : {{ pcf_build_no }}
              Branch          : {{ pcf_branch }}
              Module Version  : {{ pcf_module_ver }}
              
              Build Host      : {{ inventory_hostname }}
              Start Time      : {{ ansible_date_time.iso8601 }}
              ════════════════════════════════════════════════════════
              
            dest: "{{ log_file }}"
            mode: "0644"

        - name: "Display build environment ready"
          debug:
            msg: |
              ✅ Build environment created:
              - Build Root: {{ build_root }}
              - Releases Dir: {{ releases_dir }}
              - Log File: {{ log_file }}

      tags: [prepare]

    # =========================================================================
    # STEP 5: Verify and Copy Source Code
    # =========================================================================
    - name: "Step 5️⃣ - Verify and Copy Source Code"
      block:
        - name: "Verify SVN source exists"
          stat:
            path: "{{ pcf_source }}"
          register: svn_check
          failed_when: not svn_check.stat.exists

        - name: "Verify bambooBuildRpms script exists"
          stat:
            path: "{{ pcf_source }}/icu/buildtools/bambooBuildRpms"
          register: build_script_check
          failed_when: not build_script_check.stat.exists

        - name: "Display source verification"
          debug:
            msg: |
              ✅ Source code verified:
              - Path: {{ pcf_source }}
              - Build Script: {{ pcf_source }}/icu/buildtools/bambooBuildRpms
              - Exists: YES

        - name: "Copy SVN source to build directory"
          shell: |
            cp -r {{ pcf_source }}/* {{ build_root }}/
            cp -r {{ pcf_source }}/.[^.]* {{ build_root }}/ 2>/dev/null || true
            echo "Source code copied successfully"
          register: copy_result
          changed_when: true

        - name: "Check what was copied"
          shell: |
            echo "Build directory contents:"
            ls -la {{ build_root }}/ | head -20
            echo ""
            echo "Total items:"
            find {{ build_root }} -type f | wc -l
            find {{ build_root }} -type d | wc -l
          register: contents_check
          changed_when: false

        - name: "Display build directory contents"
          debug:
            msg: "{{ contents_check.stdout }}"

        - name: "Verify bambooBuildRpms exists in build directory"
          stat:
            path: "{{ build_root }}/icu/buildtools/bambooBuildRpms"
          register: build_script_in_build_dir
          failed_when: not build_script_in_build_dir.stat.exists

        - name: "Display source copy status"
          debug:
            msg: |
              ✅ Source code copied:
              - Source: {{ pcf_source }}
              - Destination: {{ build_root }}
              - Build Script: {{ build_root }}/icu/buildtools/bambooBuildRpms ✅

      tags: [prepare]

    # =========================================================================
    # STEP 6: Execute PCF Build
    # =========================================================================
    - name: "Step 6️⃣ - Execute PCF Compilation"
      block:
        - name: "Log build start"
          lineinfile:
            path: "{{ log_file }}"
            line: "\n[BUILD_START] {{ ansible_date_time.iso8601 }}"
            insertafter: EOF

        - name: "Run PCF build script"
          shell: |
            set -euo pipefail
            
            echo "🔨 Starting PCF build..."
            echo "Build No: {{ pcf_build_no }}"
            echo "Branch: {{ pcf_branch }}"
            echo "Module Ver: {{ pcf_module_ver }}"
            echo ""
            
            # Change to build directory and execute build script
            cd {{ build_root }}
            
            # Execute build script
            ./icu/buildtools/bambooBuildRpms \
              -u bambooagent \
              -r "{{ pcf_build_no }}" \
              -d "{{ build_root }}" \
              -P pcf \
              -v "{{ pcf_module_ver }}" \
              -t "https://scm.forge.avaya.com/svnroot/aurora/branches/{{ pcf_branch }}" \
              2>&1 | tee -a {{ log_file }}
            
            BUILD_STATUS=${PIPESTATUS[0]}
            
            if [ $BUILD_STATUS -eq 0 ]; then
              echo ""
              echo "✅ PCF build completed successfully"
            else
              echo ""
              echo "❌ PCF build FAILED with status: $BUILD_STATUS"
              exit $BUILD_STATUS
            fi
          args:
            executable: /bin/bash
          register: build_output
          timeout: 10800  # 3 hours
          tags: [build]

        - name: "Log build completion"
          lineinfile:
            path: "{{ log_file }}"
            line: "[BUILD_END] {{ ansible_date_time.iso8601 }}"
            insertafter: EOF

      rescue:
        - name: "❌ Build failed"
          debug:
            msg: |
              ❌ PCF BUILD FAILED
              
              Command output:
              {{ build_output.stdout }}
              
              See log file for details:
              {{ log_file }}
          
        - name: "Fail the play"
          fail:
            msg: "PCF build failed. Check {{ log_file }}"

      tags: [build]

    # =========================================================================
    # STEP 7: Locate Generated RPM
    # =========================================================================
    - name: "Step 7️⃣ - Locate Generated RPM"
      block:
        - name: "Search for generated RPM"
          find:
            paths:
              - "{{ build_root }}"
              - "{{ releases_dir }}"
              - "/tmp"
              - "/root"
            patterns: "pcf-*.rpm"
            recurse: yes
          register: found_rpms

        - name: "Verify RPM was generated"
          assert:
            that:
              - found_rpms.matched > 0
            fail_msg: |
              ❌ NO RPM GENERATED
              
              Search paths:
              - {{ build_root }}
              - {{ releases_dir }}
              - /tmp
              - /root
              
              Check {{ log_file }} for build errors
            success_msg: "✅ Found {{ found_rpms.matched }} RPM file(s)"

        - name: "Select most recent RPM"
          set_fact:
            pcf_rpm: "{{ found_rpms.files | sort(attribute='mtime', reverse=true) | first }}"

        - name: "Display RPM details"
          debug:
            msg: |
              ✅ PCF RPM GENERATED
              
              File: {{ pcf_rpm.path }}
              Name: {{ pcf_rpm.path | basename }}
              Size: {{ (pcf_rpm.size / 1024 / 1024) | round(2) }}MB
              Modified: {{ ansible_date_time.iso8601 }}

      tags: [validate]

    # =========================================================================
    # STEP 8: Copy RPM to Releases Directory
    # =========================================================================
    - name: "Step 8️⃣ - Copy RPM to Releases"
      block:
        - name: "Copy RPM to releases directory"
          copy:
            src: "{{ pcf_rpm.path }}"
            dest: "{{ releases_dir }}/{{ pcf_rpm.path | basename }}"
            remote_src: yes
            mode: "0644"
          register: rpm_copy

        - name: "Verify RPM in releases directory"
          stat:
            path: "{{ releases_dir }}/{{ pcf_rpm.path | basename }}"
          register: released_rpm

        - name: "Display final status"
          debug:
            msg: |
              ════════════════════════════════════════════════════════
              ✅ PCF BUILD SUCCESSFUL
              ════════════════════════════════════════════════════════
              
              RPM Location: {{ released_rpm.stat.path }}
              RPM Size    : {{ (released_rpm.stat.size / 1024 / 1024) | round(2) }}MB
              
              Build Log   : {{ log_file }}
              
              Next Steps:
              1. Verify RPM contents
              2. Deploy to test environment
              3. Run validation tests
              
              ════════════════════════════════════════════════════════

      tags: [publish]

    # =========================================================================
    # STEP 9: Summary
    # =========================================================================
    - name: "Step 9️⃣ - Build Summary"
      debug:
        msg: |
          ════════════════════════════════════════════════════════
          🎉 PCF BUILD PIPELINE COMPLETED
          ════════════════════════════════════════════════════════
          Status      : ✅ SUCCESS
          Build No    : {{ pcf_build_no }}
          Branch      : {{ pcf_branch }}
          Module Ver  : {{ pcf_module_ver }}
          
          Artifact    : {{ releases_dir }}/{{ pcf_rpm.path | basename }}
          Log File    : {{ log_file }}
          
          Duration    : (check log for exact time)
          ════════════════════════════════════════════════════════
      tags: [always]