---
# =============================================================================
# Build PCF Module Playbook
# =============================================================================
# Purpose: Orchestrate PCF module compilation and RPM generation
# Hosts:   buildserver group
# Params:  branch, build_no, module_ver, environment (via -e or Jenkins)
# =============================================================================

- name: "Build PCF Module Pipeline"
  hosts: buildserver
  become: yes
  gather_facts: yes
  
  vars:
    # =========================================================================
    # BUILD PARAMETERS (Override via -e "branch=X build_no=Y module_ver=Z")
    # =========================================================================
    build_pcf_branch: "{{ branch | default('UNDEFINED') }}"
    build_pcf_build_no: "{{ build_no | default('UNDEFINED') }}"
    build_pcf_module_ver: "{{ module_ver | default('UNDEFINED') }}"
    build_pcf_environment: "{{ environment | default('production') }}"
    
    # =========================================================================
    # DERIVED PATHS (computed at runtime)
    # =========================================================================
    build_pcf_build_root: "/tmp/pcf_builds/{{ build_pcf_branch }}"
    build_pcf_releases_dir: "/root/releases"
    build_pcf_log: "/var/log/avaya_pipeline/build_pcf_{{ build_pcf_build_no }}_{{ ansible_date_time.date }}.log"

  pre_tasks:
    # =========================================================================
    # STAGE 0: PARAMETER VALIDATION
    # =========================================================================
    - name: "⚡ STAGE 0: Parameter Validation"
      block:
        - name: "Validate required parameters are set"
          assert:
            that:
              - build_pcf_branch != 'UNDEFINED'
              - build_pcf_build_no != 'UNDEFINED'
              - build_pcf_module_ver != 'UNDEFINED'
            fail_msg: |
              ❌ MISSING REQUIRED PARAMETERS
              
              Usage: ansible-playbook build_pcf.yml -e "branch=X build_no=Y module_ver=Z"
              
              Example:
                -e "branch=10.2.1.0_orion_int build_no=24800 module_ver=4.3.4.193953"
                
              Current values:
                branch:     {{ build_pcf_branch }}
                build_no:   {{ build_pcf_build_no }}
                module_ver: {{ build_pcf_module_ver }}
            success_msg: "✅ All required parameters provided"
          tags: [validate, always]

        - name: "Validate branch format (10.2.1.X_orion_int)"
          assert:
            that:
              - build_pcf_branch is regex('^10\.2\.1\.[0-9]+_orion_int$')
            fail_msg: |
              ❌ Invalid branch format: {{ build_pcf_branch }}
              Expected: 10.2.1.X_orion_int (e.g., 10.2.1.0_orion_int)
            success_msg: "✅ Branch format valid: {{ build_pcf_branch }}"
          tags: [validate, always]

        - name: "Validate build_no is numeric"
          assert:
            that:
              - build_pcf_build_no is regex('^[0-9]+$')
            fail_msg: "❌ build_no must be numeric, got: {{ build_pcf_build_no }}"
            success_msg: "✅ Build number valid: {{ build_pcf_build_no }}"
          tags: [validate, always]

        - name: "Validate module_ver format (X.X.X.XXXXXX)"
          assert:
            that:
              - build_pcf_module_ver is regex('^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$')
            fail_msg: |
              ❌ Invalid module version: {{ build_pcf_module_ver }}
              Expected format: X.X.X.X (e.g., 4.3.4.193953)
            success_msg: "✅ Module version format valid: {{ build_pcf_module_ver }}"
          tags: [validate, always]

        - name: "Display build configuration"
          debug:
            msg: |
              ════════════════════════════════════════════════════════
              🔨 PCF BUILD CONFIGURATION
              ════════════════════════════════════════════════════════
              Branch           : {{ build_pcf_branch }}
              Build Number     : {{ build_pcf_build_no }}
              Module Version   : {{ build_pcf_module_ver }}
              Environment      : {{ build_pcf_environment }}
              Build Host       : {{ inventory_hostname }}
              Build Date       : {{ ansible_date_time.iso8601 }}
              ════════════════════════════════════════════════════════
          tags: [always]

      rescue:
        - name: "❌ Fail on validation errors"
          fail:
            msg: "Parameter validation failed. See details above."
      tags: [validate, always]

    # =========================================================================
    # STAGE 0B: WORKSPACE PREPARATION
    # =========================================================================
    - name: "⚡ STAGE 0B: Prepare Build Workspace"
      block:
        - name: "Create required directories"
          file:
            path: "{{ item }}"
            state: directory
            mode: "0755"
            owner: root
            group: root
          loop:
            - "{{ build_pcf_build_root | dirname }}"
            - "{{ build_pcf_releases_dir }}"
            - "/var/log/avaya_pipeline"
          tags: [prepare, always]

        - name: "Verify disk space (minimum 20GB)"
          shell: |
            df -BG {{ build_pcf_build_root | dirname }} | awk 'NR==2 {gsub("G", ""); print $4}'
          register: disk_free
          changed_when: false
          failed_when: (disk_free.stdout | int) < 20
          tags: [prepare, always]

        - name: "✅ Disk space validated: {{ disk_free.stdout }}GB available"
          debug:
            msg: "✅ Sufficient disk space confirmed"
          tags: [prepare, always]

      rescue:
        - name: "❌ Workspace preparation failed"
          fail:
            msg: |
              ❌ WORKSPACE PREPARATION FAILED
              - Insufficient disk space (need 20GB, have {{ disk_free.stdout }}GB)
              - Check permissions on {{ build_pcf_build_root | dirname }}

      tags: [prepare, always]

  # ===========================================================================
  # EXECUTE BUILD ROLE
  # ===========================================================================
  roles:
    - role: build_pcf
      vars:
        build_pcf_branch: "{{ build_pcf_branch }}"
        build_pcf_build_no: "{{ build_pcf_build_no }}"
        build_pcf_module_ver: "{{ build_pcf_module_ver }}"
        build_pcf_environment: "{{ build_pcf_environment }}"
        build_pcf_build_root: "{{ build_pcf_build_root }}"
        build_pcf_releases_dir: "{{ build_pcf_releases_dir }}"
        build_pcf_log: "{{ build_pcf_log }}"
      tags: [build_pcf]

  # ===========================================================================
  # POST-BUILD VERIFICATION
  # ===========================================================================
  post_tasks:
    - name: "✅ STAGE 4: Post-Build Verification"
      block:
        - name: "Discover generated RPMs"
          find:
            paths: "{{ build_pcf_releases_dir }}"
            patterns: "*.rpm"
            file_type: file
          register: generated_rpms
          tags: [postbuild, always]

        - name: "Fail if no RPMs generated"
          assert:
            that:
              - generated_rpms.matched > 0
            fail_msg: |
              ❌ NO RPM GENERATED!
              
              Build directory: {{ build_pcf_build_root }}
              Release dir:     {{ build_pcf_releases_dir }}
              Log file:        {{ build_pcf_log }}
              
              Check log file for details.
            success_msg: "✅ {{ generated_rpms.matched }} RPM(s) generated"
          tags: [postbuild, always]

        - name: "Display build results"
          debug:
            msg: |
              ════════════════════════════════════════════════════════
              ✅ PCF BUILD COMPLETED SUCCESSFULLY
              ════════════════════════════════════════════════════════
              Build Number     : {{ build_pcf_build_no }}
              Branch           : {{ build_pcf_branch }}
              Module Version   : {{ build_pcf_module_ver }}
              
              Generated Artifacts:
              {% for rpm in generated_rpms.files | sort(attribute='path') %}
              - {{ rpm.path | basename }}
              {% endfor %}
              
              Release Directory: {{ build_pcf_releases_dir }}
              Build Log        : {{ build_pcf_log }}
              ════════════════════════════════════════════════════════
          tags: [postbuild, always]

      rescue:
        - name: "❌ Post-build verification failed"
          debug:
            msg: |
              ❌ BUILD VERIFICATION FAILED
              
              See log for details: {{ build_pcf_log }}
              
              Troubleshooting:
              1. Check build host disk space
              2. Review build log for compilation errors
              3. Verify chroot environment is available
              4. Check BuildServer connectivity
      tags: [postbuild, always]

  tags:
    - build_pcf
    - always