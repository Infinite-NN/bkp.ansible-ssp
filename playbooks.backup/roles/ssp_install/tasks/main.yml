---
# =============================================================
# SSP Install Role -- Main Entry Point
# =============================================================

- name: "[SSP_INSTALL] Role initialization"
  debug:
    msg: |
      ??????????????????????????????????????
      ?   SSP INSTALL ROLE INITIALIZATION  ?
      ??????????????????????????????????????
      ? Host          : {{ inventory_hostname }}
      ? SSP Version   : {{ ssp_install_version | default('latest') }}
      ? Install Path  : {{ ssp_install_destination | default('/opt/ssp') }}
      ? Environment   : {{ ssp_install_environment | default('unknown') }}
      ? Timestamp     : {{ ansible_date_time.iso8601 }}
      ??????????????????????????????????????
  tags:
    - always

- name: "[SSP_INSTALL] Initialize logging"
  block:
    - name: "Create log directory"
      file:
        path: "{{ log_dir }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "Initialize SSP install log"
      copy:
        content: |
          ============================================================
          SSP INSTALLATION LOG
          ============================================================
          Start Time      : {{ ansible_date_time.iso8601 }}
          Host            : {{ inventory_hostname }}
          SSP Version     : {{ ssp_install_version }}
          Install Path    : {{ ssp_install_destination }}
          Environment     : {{ ssp_install_environment }}
          Build Number    : {{ build_number | default('unknown') }}
          
          ============================================================
          Installation Phases:
          ============================================================
        dest: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        mode: '0644'

    - name: "Store log path for later use"
      set_fact:
        ssp_install_log: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"

  rescue:
    - name: "? Log initialization failed"
      fail:
        msg: "Cannot initialize SSP install log"

  tags:
    - always

- name: "[SSP_INSTALL] Pre-installation checks"
  block:
    - name: "Verify required variables"
      assert:
        that:
          - ssp_install_version is defined
          - ssp_install_url is defined
          - ssp_install_destination is defined
        fail_msg: "Missing required SSP variables"

    - name: "Check system prerequisites"
      shell: |
        echo "Checking disk space..."
        DISK_FREE=$(df "{{ ssp_install_destination | dirname }}" | awk 'NR==2 {print $4}' | sed 's/G//')
        if [ "$DISK_FREE" -lt 20 ]; then
          echo "? Insufficient disk space: ${DISK_FREE}GB (need 20GB)"
          exit 1
        fi
        echo "? Disk space OK: ${DISK_FREE}GB available"
        
        echo "Checking required packages..."
        for pkg in curl tar gzip md5sum; do
          which "$pkg" > /dev/null || { echo "? Missing: $pkg"; exit 1; }
        done
        echo "? All required packages present"
      register: prereq_check
      changed_when: false

    - name: "Display prerequisite check results"
      debug:
        msg: "{{ prereq_check.stdout }}"

    - name: "Log pre-installation phase"
      lineinfile:
        path: "{{ ssp_install_log }}"
        line: "[PRE-INSTALL] ? All prerequisites verified -- {{ ansible_date_time.iso8601 }}"
        insertafter: "Installation Phases:"

  rescue:
    - name: "? Prerequisite check failed"
      lineinfile:
        path: "{{ ssp_install_log }}"
        line: "[PRE-INSTALL] ? FAILED -- {{ ansible_date_time.iso8601 }}"
        insertafter: "Installation Phases:"

    - name: "Fail installation"
      fail:
        msg: "Pre-installation checks failed"

  tags:
    - ssp_install
    - pre_install

- name: "[SSP_INSTALL] Include pre-check tasks"
  include_tasks: pre_checks.yml
  vars:
    ssp_log: "{{ ssp_install_log }}"
  tags:
    - ssp_install
    - pre_checks

- name: "[SSP_INSTALL] Include download tasks"
  include_tasks: download.yml
  vars:
    ssp_log: "{{ ssp_install_log }}"
  tags:
    - ssp_install
    - download

- name: "[SSP_INSTALL] Include extract tasks"
  include_tasks: extract.yml
  vars:
    ssp_log: "{{ ssp_install_log }}"
  tags:
    - ssp_install
    - extract

- name: "[SSP_INSTALL] Include install tasks"
  include_tasks: install.yml
  vars:
    ssp_log: "{{ ssp_install_log }}"
  tags:
    - ssp_install
    - install

- name: "[SSP_INSTALL] Post-installation verification"
  block:
    - name: "Verify SSP installation directory"
      stat:
        path: "{{ ssp_install_destination }}"
      register: ssp_stat
      failed_when: not ssp_stat.exists

    - name: "Check SSP version"
      shell: |
        if [ -f "{{ ssp_install_destination }}/version.txt" ]; then
          cat "{{ ssp_install_destination }}/version.txt"
        elif [ -f "{{ ssp_install_destination }}/VERSION" ]; then
          cat "{{ ssp_install_destination }}/VERSION"
        else
          echo "Version information not available"
        fi
      register: ssp_version_check
      changed_when: false
      failed_when: false

    - name: "Display SSP version"
      debug:
        msg: "Installed SSP Version: {{ ssp_version_check.stdout }}"

    - name: "Log installation completion"
      lineinfile:
        path: "{{ ssp_install_log }}"
        line: "[INSTALL] ? SSP INSTALLATION COMPLETE -- {{ ansible_date_time.iso8601 }}"
        insertafter: EOF

  rescue:
    - name: "?  Post-installation verification warning"
      lineinfile:
        path: "{{ ssp_install_log }}"
        line: "[INSTALL] ?  Post-verification issues detected -- {{ ansible_date_time.iso8601 }}"
        insertafter: EOF

  tags:
    - ssp_install
    - post_install

- name: "[SSP_INSTALL] Role completion"
  debug:
    msg: |
      ? SSP INSTALL ROLE COMPLETE
      Log: {{ ssp_install_log }}
  tags:
    - always