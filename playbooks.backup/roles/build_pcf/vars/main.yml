---
# =============================================================================
# Build PCF Role - Variables (Patterns Only)
# =============================================================================
# NOTE: DO NOT compute variables here that depend on other variables!
# Computed variables will cause recursion errors.
# Use set_fact in tasks/main.yml instead.
# =============================================================================

# ---------------------------------------------------------
# VALIDATION PATTERNS (Regex) - Used in assertions
# ---------------------------------------------------------
branch_pattern: '^10\.2\.1\.[0-9]+_orion_int$'
version_pattern: '^10\.2\.1\.[0-9]+$'
module_ver_pattern: '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'
build_no_pattern: '^[0-9]+$'
rpm_name_pattern: '^pcf-module-.*\.rpm$'

# ---------------------------------------------------------
# FEATURE FLAGS
# ---------------------------------------------------------
fail_fast: true
max_consecutive_retries: 3
abort_on_role_failure: true