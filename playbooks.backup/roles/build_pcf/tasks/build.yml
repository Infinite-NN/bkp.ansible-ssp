---
# =============================================================================
# Build PCF - Main Compilation Stage
# =============================================================================

- name: "🔨 BUILD: Pre-build setup"
  block:
    - name: "Clean old build directory"
      file:
        path: "{{ build_pcf_build_root }}"
        state: absent

    - name: "Create fresh build directory"
      file:
        path: "{{ build_pcf_build_root }}"
        state: directory
        mode: "0755"

    - name: "Prepare build directory"
      shell: |
        set -euo pipefail
        # Ensure directory structure
        mkdir -p "{{ build_pcf_build_root }}/icu/buildtools"
        # Verify writable
        test -w "{{ build_pcf_build_root }}" && echo "✅ Build dir ready"
      args:
        executable: /bin/bash
      register: prep_result

    - name: "Log build preparation"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[BUILD_PREP] ✅ {{ prep_result.stdout }} - {{ ansible_date_time.iso8601 }}"
        insertafter: "EOF"

  rescue:
    - name: "❌ Build prep failed"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[BUILD_PREP] ❌ FAILED - {{ ansible_failed_task.name }}"
        insertafter: "EOF"

    - fail:
        msg: "Build preparation failed"
  tags: [build, build_prep]

# =============================================================================
# MAIN BUILD EXECUTION
# =============================================================================

- name: "🔨 BUILD: Execute PCF compilation via chroot"
  block:
    - name: "Log build start"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[BUILD] ⏱️  Starting PCF build - {{ ansible_date_time.iso8601 }}"
        insertafter: "EOF"

    - name: "Capture build start time"
      command: date +%s
      register: build_start_time
      changed_when: false

    - name: "Verify chroot environment exists"
      stat:
        path: /sandbox/rhel810
      register: chroot_stat

    - name: "Fail if chroot missing"
      fail:
        msg: "❌ Chroot environment not found at /sandbox/rhel810"
      when: not chroot_stat.stat.exists

    - name: "Execute PCF build in chroot"
      shell: |
        set -euo pipefail
        
        echo "════════════════════════════════════════════════════════"
        echo "🔨 PCF BUILD EXECUTION"
        echo "════════════════════════════════════════════════════════"
        echo "Branch          : {{ build_pcf_branch }}"
        echo "Build Number    : {{ build_pcf_build_no }}"
        echo "Module Version  : {{ build_pcf_module_ver }}"
        echo "Build Root      : {{ build_pcf_build_root }}"
        echo "Start Time      : {{ ansible_date_time.iso8601 }}"
        echo "════════════════════════════════════════════════════════"
        echo ""
        
        # Execute chroot build script
        sudo chroot /sandbox/rhel810 \
          /opt/pcf/icu/buildtools/bambooBuildRpms \
          -u bambooagent \
          -r "{{ build_pcf_build_no }}" \
          -d "/opt/pcf" \
          -P pcf \
          -v "{{ build_pcf_module_ver }}" \
          -t "https://scm.forge.avaya.com/svnroot/aurora/branches/{{ build_pcf_branch }}" \
          2>&1
        
        BUILD_EXIT=$?
        
        if [ $BUILD_EXIT -eq 0 ]; then
          echo ""
          echo "✅ PCF build completed successfully"
        else
          echo ""
          echo "❌ PCF build FAILED with exit code: $BUILD_EXIT"
          exit $BUILD_EXIT
        fi
      args:
        executable: /bin/bash
      register: build_result
      timeout: 10800  # 3 hours
      failed_when: build_result.rc != 0
      tags: [build, build_compile]

    - name: "Log build output"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[BUILD] {{ item }}"
        insertafter: "EOF"
      loop: "{{ build_result.stdout_lines | default([]) | tail(20) }}"
      ignore_errors: yes

    - name: "Capture build end time"
      command: date +%s
      register: build_end_time
      changed_when: false

    - name: "Calculate build duration"
      set_fact:
        build_duration_seconds: "{{ (build_end_time.stdout | int) - (build_start_time.stdout | int) }}"

    - name: "Log build completion"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[BUILD] ✅ Compilation completed in {{ (build_duration_seconds | int // 60) }}m {{ (build_duration_seconds | int % 60) }}s"
        insertafter: "EOF"

  rescue:
    - name: "❌ Log build failure"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[BUILD] ❌ COMPILATION FAILED - {{ ansible_failed_task.name }}"
        insertafter: "EOF"
      ignore_errors: yes

    - fail:
        msg: |
          ❌ PCF compilation failed for {{ build_pcf_branch }}
          
          See build log: {{ task_log_file }}
  tags: [build, build_compile]

# =============================================================================
# POST-BUILD: LOCATE AND VALIDATE RPM
# =============================================================================

- name: "🔍 BUILD: Locate and validate generated RPM"
  block:
    - name: "Search for generated RPM files"
      find:
        paths:
          - "{{ build_pcf_build_root }}"
          - "/root/releases"
          - "/tmp"
        patterns: "pcf-*.rpm"
        recurse: yes
        file_type: file
      register: found_rpms
      tags: [build, build_validate]

    - name: "Fail if no RPM found"
      fail:
        msg: |
          ❌ NO PCF RPM GENERATED!
          
          Searched in:
          - {{ build_pcf_build_root }}
          - /root/releases
          - /tmp
          
          Expected pattern: pcf-*.rpm
      when: found_rpms.matched == 0

    - name: "Select most recent RPM"
      set_fact:
        pcf_rpm_file: "{{ found_rpms.files | sort(attribute='mtime', reverse=true) | first }}"

    - name: "Display found RPM"
      debug:
        msg: |
          ✅ RPM Located:
          Path: {{ pcf_rpm_file.path }}
          Size: {{ (pcf_rpm_file.size / 1024 / 1024) | round(2) }}MB
          Modified: {{ ansible_date_time.iso8601 }}

    - name: "Verify RPM file integrity"
      shell: |
        set -euo pipefail
        RPM_FILE="{{ pcf_rpm_file.path }}"
        
        # Verify file is readable
        test -r "$RPM_FILE" || exit 1
        
        # Verify RPM signature
        rpm -K "$RPM_FILE" > /dev/null 2>&1 || exit 1
        
        echo "✅ RPM integrity verified"
      args:
        executable: /bin/bash
      register: rpm_integrity
      tags: [build, build_validate]

    - name: "Query RPM metadata"
      shell: |
        rpm -qp --queryformat 'NAME=%{NAME}\nVERSION=%{VERSION}\nRELEASE=%{RELEASE}\nARCH=%{ARCH}\nSIZE=%{SIZE}\n' \
        "{{ pcf_rpm_file.path }}"
      register: rpm_metadata_output
      changed_when: false
      tags: [build, build_validate]

    - name: "Parse RPM metadata"
      set_fact:
        rpm_info: |
          {% set lines = rpm_metadata_output.stdout_lines %}
          {% set meta = {} %}
          {% for line in lines %}
            {% if '=' in line %}
              {% set parts = line.split('=', 1) %}
              {% set _ = meta.update({parts[0]: parts[1]}) %}
            {% endif %}
          {% endfor %}
          {{ meta }}

    - name: "Validate RPM version matches build"
      assert:
        that:
          - rpm_info.VERSION == build_pcf_module_ver
        fail_msg: |
          ❌ RPM version mismatch!
          Expected: {{ build_pcf_module_ver }}
          Got:      {{ rpm_info.VERSION }}
        success_msg: "✅ RPM version matches: {{ rpm_info.VERSION }}"

    - name: "Calculate RPM checksum"
      shell: md5sum "{{ pcf_rpm_file.path }}" | awk '{print $1}'
      register: rpm_md5
      changed_when: false

    - name: "Create releases directory"
      file:
        path: "{{ build_pcf_releases_dir }}"
        state: directory
        mode: "0755"

    - name: "Copy RPM to releases directory"
      copy:
        src: "{{ pcf_rpm_file.path }}"
        dest: "{{ build_pcf_releases_dir }}/{{ pcf_rpm_file.path | basename }}"
        remote_src: yes
        mode: "0644"

    - name: "Log RPM details"
      lineinfile:
        path: "{{ task_log_file }}"
        line: |
          [RPM] ✅ RPM Generated
            Name    : {{ rpm_info.NAME }}
            Version : {{ rpm_info.VERSION }}
            Release : {{ rpm_info.RELEASE }}
            Arch    : {{ rpm_info.ARCH }}
            Size    : {{ (rpm_info.SIZE | int / 1024 / 1024) | round(2) }}MB
            MD5     : {{ rpm_md5.stdout }}
            Path    : {{ build_pcf_releases_dir }}/{{ pcf_rpm_file.path | basename }}
        insertafter: "EOF"

    - name: "Display RPM details summary"
      debug:
        msg: |
          ════════════════════════════════════════════════════════
          ✅ RPM BUILD SUCCESSFUL
          ════════════════════════════════════════════════════════
          Name    : {{ rpm_info.NAME }}
          Version : {{ rpm_info.VERSION }}
          Release : {{ rpm_info.RELEASE }}
          Size    : {{ (rpm_info.SIZE | int / 1024 / 1024) | round(2) }}MB
          MD5     : {{ rpm_md5.stdout }}
          Location: {{ build_pcf_releases_dir }}/{{ pcf_rpm_file.path | basename }}
          ════════════════════════════════════════════════════════

  rescue:
    - name: "❌ RPM validation failed"
      lineinfile:
        path: "{{ task_log_file }}"
        line: "[RPM] ❌ VALIDATION FAILED - {{ ansible_failed_task.name }}"
        insertafter: "EOF"
      ignore_errors: yes

    - fail:
        msg: "RPM validation failed. See {{ task_log_file }}"
  tags: [build, build_validate]