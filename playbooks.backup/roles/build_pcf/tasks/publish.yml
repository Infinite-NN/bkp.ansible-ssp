---
# =============================================================================
# Build PCF - Publish Build Artifacts
# =============================================================================

- name: "📦 PUBLISH: Create build manifest and artifacts"
  block:
    - name: "Generate build manifest"
      copy:
        content: |
          ════════════════════════════════════════════════════════
          PCF BUILD MANIFEST
          ════════════════════════════════════════════════════════
          Build Number    : {{ build_pcf_build_no }}
          Branch          : {{ build_pcf_branch }}
          Module Version  : {{ build_pcf_module_ver }}
          Environment     : {{ build_pcf_environment }}
          Build Host      : {{ inventory_hostname }}
          Build Timestamp : {{ ansible_date_time.iso8601 }}
          
          Generated Artifacts:
          - See directory: {{ build_pcf_releases_dir }}
          
          Build Log:
          - {{ task_log_file }}
          
          ════════════════════════════════════════════════════════
        dest: "{{ build_pcf_releases_dir }}/MANIFEST_{{ build_pcf_build_no }}.txt"
        mode: "0644"
      tags: [publish]

    - name: "Generate Jenkins-compatible build properties"
      copy:
        content: |
          BUILD_NUMBER={{ build_pcf_build_no }}
          BUILD_BRANCH={{ build_pcf_branch }}
          BUILD_MODULE_VERSION={{ build_pcf_module_ver }}
          BUILD_ENVIRONMENT={{ build_pcf_environment }}
          BUILD_TIMESTAMP={{ ansible_date_time.iso8601 }}
          BUILD_HOST={{ inventory_hostname }}
          BUILD_STATUS=SUCCESS
          BUILD_ARTIFACTS_DIR={{ build_pcf_releases_dir }}
          BUILD_LOG_FILE={{ task_log_file }}
        dest: "{{ build_pcf_releases_dir }}/build.properties"
        mode: "0644"
      tags: [publish]

    - name: "List all generated artifacts"
      find:
        paths: "{{ build_pcf_releases_dir }}"
        file_type: file
      register: all_artifacts
      tags: [publish]

    - name: "Log publish completion"
      lineinfile:
        path: "{{ task_log_file }}"
        line: |
          [PUBLISH] ✅ Artifacts published
            - {{ all_artifacts.matched }} file(s) in {{ build_pcf_releases_dir }}
            - Timestamp: {{ ansible_date_time.iso8601 }}
        insertafter: "EOF"

    - name: "Display published artifacts"
      debug:
        msg: |
          ════════════════════════════════════════════════════════
          ✅ BUILD ARTIFACTS PUBLISHED
          ════════════════════════════════════════════════════════
          {% for artifact in all_artifacts.files | sort(attribute='path') %}
          - {{ artifact.path | basename }}
          {% endfor %}
          
          Location: {{ build_pcf_releases_dir }}
          ════════════════════════════════════════════════════════
      tags: [publish]

  rescue:
    - name: "❌ Publish failed (non-blocking)"
      debug:
        msg: "⚠️ Artifact publishing encountered issues but build is complete"
      tags: [publish]
  tags: [publish, build_pcf]