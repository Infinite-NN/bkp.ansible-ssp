---
# =============================================================
# Security Updates Role -- Main Entry Point
# Orchestrates security RPM downloads and reporting
# =============================================================

- name: "[SEC-UPDATE] Security updates role initialization"
  debug:
    msg: |
      ?  Security Updates Role Loaded
      +- Purpose  : Download & validate security RPMs
      +- Target   : {{ inventory_hostname }}
      +- BaseOS   : {{ dnf_repo_baseos }}
      +- AppStream: {{ dnf_repo_appstream }}
  tags:
    - security_updates
    - sec_update_init

---

- name: "[SEC-UPDATE] Include prerequisite tasks"
  block:
    - name: "Validate role prerequisites"
      assert:
        that:
          - log_dir is defined
          - dnf_repo_baseos is defined
          - dnf_repo_appstream is defined
        fail_msg: "Missing required variables for security_updates role"
        success_msg: "? All prerequisites validated"

    - name: "Create security updates directories"
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        recurse: yes
      loop:
        - "{{ log_dir }}"
        - "{{ security_rpms_download_dir }}"
        - "{{ security_rpms_archive_dir }}"
        - "{{ security_report_dir }}"

  rescue:
    - fail:
        msg: "Security updates role prerequisite check failed"

  tags:
    - security_updates
    - sec_update_prereq

---

- name: "[SEC-UPDATE] Include download RPMs task"
  include_tasks: download_rpms.yml
  tags:
    - security_updates
    - sec_update_download

---

- name: "[SEC-UPDATE] Include validation task"
  include_tasks: validate.yml
  tags:
    - security_updates
    - sec_update_validate

---

- name: "[SEC-UPDATE] Include report generation task"
  include_tasks: generate_report.yml
  tags:
    - security_updates
    - sec_update_report

---

- name: "[SEC-UPDATE] Log role completion"
  lineinfile:
    path: "{{ log_dir }}/pipeline_{{ ansible_date_time.date }}.log"
    line: "[SEC-UPDATE][COMPLETE] Security updates role complete -- {{ ansible_date_time.iso8601 }}"
    insertafter: EOF
  ignore_errors: yes
  tags:
    - security_updates
    - always