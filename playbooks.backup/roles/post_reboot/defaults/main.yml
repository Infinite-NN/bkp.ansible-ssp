---
# =============================================================
# Post-Reboot Role -- Default Variables
# All values hardcoded -- NO Jinja2 references
# Override via group_vars/host_vars or -e at CLI
# =============================================================

# ---------------------------------------------------------
# IPCS Service Control
# ---------------------------------------------------------

# IPCS initialization/control script path
ipcs_script: "/usr/local/ipcs/icu3/scripts/ipcs-init.py"

# Delay after starting IPCS before checking status (seconds)
ipcs_start_delay: 30

# Retries for GUI UP check after IPCS start
ipcs_gui_retries: 60

# Delay between GUI checks (seconds)
ipcs_gui_retry_delay: 10

# Timeout for IPCS startup (seconds)
ipcs_startup_timeout: 600

# ---------------------------------------------------------
# SSP Installation Paths
# ---------------------------------------------------------

# Working directory for SSP extraction/staging
ssp_work_dir: "/opt/ssp_work"

# Final SSP installation directory
ssp_install_dir: "/opt/ssp"

# ssp_path will be discovered at runtime (leave empty)
ssp_path: ""

# ---------------------------------------------------------
# Repository Paths
# ---------------------------------------------------------

# Base path for downloaded RPM repositories
repo_base: "/repos"

# BaseOS RPM repository
repo_baseos_path: "/repos/BaseOS"

# AppStream RPM repository
repo_appstream_path: "/repos/AppStream"

# Archive base for storing old RPMs
repo_archive_base: "/repos/archive"

# PCF archive path
repo_pcf_archive_path: "/repos/archive/pcf"

# Additional RPMs directory
additional_rpms_dir: "/repos/AdditionalRPMs"

# ---------------------------------------------------------
# SSP Internal Structure
# ---------------------------------------------------------

# Filename for RPM list inside SSP
ssp_install_rpms_list_file: "InstallRPMsList"

# Filename for SSP details/security info
ssp_details_file: "sbc-ssp-details"

# New RPMs directory inside SSP
ssp_new_rpms_dir: "newRPMs"

# ---------------------------------------------------------
# Report and Artifact Files
# ---------------------------------------------------------

# Security update report file
report_file: "/tmp/security_update_report.txt"

# RPM inventory file
rpm_inventory_file: "/tmp/rpm_inventory.txt"

# HTML report output directory
html_report_dir: "/tmp/avaya_artifacts"

# HTML report filename
html_report_filename: "ssp_security_report.html"

# ---------------------------------------------------------
# Artifact Server Configuration
# ---------------------------------------------------------

# Artifact server base URL
artifact_server_base: "http://10.133.43.170"

# Releases path on artifact server
releases_path: "releases"

# ---------------------------------------------------------
# PCF Configuration
# ---------------------------------------------------------

# PCF RPM filename prefix
pcf_rpm_prefix: "pcf-module"

# PCF Avaya Stream path
pcf_avaya_stream: "AvayaStream/Packages"

# PCF branch version regex pattern
pcf_branch_regex: '^10\.2\.1\.[0-9]+$'

# ---------------------------------------------------------
# Release/Output Paths
# ---------------------------------------------------------

# Output directory for repackaged SSP
ssp_release_output_dir: "/root/releases/SSP"

# External storage SSP directory (optional backup)
ext_storage_ssp_dir: "/ext_storage/releases/SSP"

# ---------------------------------------------------------
# Timeout Configuration (seconds)
# ---------------------------------------------------------

# SSP move/copy operation timeout
post_reboot_timeout_ssp_move: 300

# RPM operations (download, copy, update) timeout
post_reboot_timeout_rpm_ops: 600

# PCF fetch operation timeout
post_reboot_timeout_pcf_fetch: 300

# Extract/repackage timeout
post_reboot_timeout_extract: 300

# Report generation timeout
post_reboot_timeout_report: 60

# ---------------------------------------------------------
# Logging
# ---------------------------------------------------------

# Log directory for pipeline logs
log_dir: "/var/log/avaya_pipeline"

# Log retention (days)
log_retention_days: 90

# ---------------------------------------------------------
# DNF/YUM Repository Names
# ---------------------------------------------------------

# BaseOS repo name (RHEL 8+)
dnf_repo_baseos: "rhel-8-for-x86_64-baseos-rpms"

# AppStream repo name (RHEL 8+)
dnf_repo_appstream: "rhel-8-for-x86_64-appstream-rpms"

# ---------------------------------------------------------
# Feature Flags
# ---------------------------------------------------------

# Archive old RPMs in /repos/archive before updating
archive_old_rpms: true

# Enable backup of SSP before move/update
backup_ssp_before_update: true

# Generate HTML security report
generate_html_report: true

# Verify RPM checksums
verify_rpm_checksums: false

# Cleanup work directories after completion
cleanup_work_dirs: true

# Cleanup on failure (vs. keep for diagnosis)
cleanup_on_failure: false

# ---------------------------------------------------------
# Additional RPM Configuration
# ---------------------------------------------------------

# Download additional system RPMs for SSP
download_additional_rpms: true

# Download security updates (BaseOS + AppStream)
download_security_updates: true

# Update PCF modules
update_pcf_modules: true

# Update SBC release information
update_sbc_release: true

# ---------------------------------------------------------
# Validation and Error Handling
# ---------------------------------------------------------

# Fail fast on first error (vs. continue with warnings)
fail_on_error: true

# Verify ssp_path exists before operations
validate_ssp_path_exists: true

# Verify repository paths exist before operations
validate_repo_paths_exist: true

# Minimum RPM count to consider update successful
min_rpm_count_success: 10

# ---------------------------------------------------------
# Debug and Diagnostics
# ---------------------------------------------------------

# Enable verbose logging
verbose_logging: false

# Enable debug output
debug_mode: false

# Keep diagnostics on failure
keep_diagnostics_on_failure: true

# Collect full system state on failure
collect_full_diagnostics: true

# ---------------------------------------------------------
# Repackage Configuration
# ---------------------------------------------------------

# Compress output SSP with gzip
repackage_compress: true

# Generate MD5 checksum of repackaged SSP
repackage_generate_checksum: true

# Include backup in repackage
repackage_include_backup: false

# Maximum repackage size (GB)
repackage_max_size_gb: 5

# ---------------------------------------------------------
# Retry Configuration
# ---------------------------------------------------------

# Default retry count for operations
default_max_retries: 3

# Retry count for file copy operations
file_copy_retries: 5

# Retry delay for file operations (seconds)
file_operation_retry_delay: 10

# Retry count for network operations
network_operation_retries: 5

# Network operation retry delay (seconds)
network_operation_retry_delay: 30

# ---------------------------------------------------------
# System Requirements
# ---------------------------------------------------------

# Minimum free disk space on /opt (GB)
min_disk_free_gb: 2

# Minimum free disk space on / (GB)
min_root_disk_free_gb: 1

# Minimum memory available (MB)
min_memory_mb: 512