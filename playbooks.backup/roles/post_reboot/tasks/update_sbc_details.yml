---
# =============================================================
# Post-Reboot -- Update sbc-ssp-details with Security Info
# APPEND ONLY: adds newly downloaded RPMs to security details
# Format: pkg-ver.arch | Severity | Advisory | CVEs
# =============================================================

- name: "[DETAILS] Initialize sbc-ssp-details update phase"
  block:
    - name: "Log update start"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: "[DETAILS][START] {{ ansible_date_time.iso8601 }}"
        create: yes

    - name: "Display configuration"
      debug:
        msg: |
          ? sbc-ssp-details Update Configuration:
          +- SSP Path     : {{ ssp_path }}
          +- Source RPMs  : {{ repo_baseos_path }}, {{ repo_appstream_path }}
          +- Output File  : {{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}

  tags:
    - details
    - details_init

---

- name: "[DETAILS] Validate prerequisites"
  block:
    - name: "Verify ssp_path is set"
      assert:
        that:
          - ssp_path is defined
          - ssp_path | length > 0
        fail_msg: "ssp_path is not defined"
        success_msg: "? ssp_path validated"

    - name: "Verify SSP installation exists"
      stat:
        path: "{{ ssp_path }}"
      register: ssp_stat
      failed_when: not ssp_stat.stat.exists

    - name: "Verify repository sources exist"
      stat:
        path: "{{ item }}"
      register: repo_stat
      loop:
        - "{{ repo_baseos_path }}"
        - "{{ repo_appstream_path }}"

  rescue:
    - fail:
        msg: "Prerequisite validation failed -- {{ ansible_failed_result.msg }}"

  tags:
    - details
    - details_validate

---

- name: "[DETAILS] Initialize or backup sbc-ssp-details"
  block:
    - name: "Check if sbc-ssp-details exists"
      stat:
        path: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}"
      register: details_stat

    - name: "Backup existing sbc-ssp-details"
      copy:
        src: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}"
        dest: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}.backup.{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: yes
      when: details_stat.stat.exists

    - name: "Initialize sbc-ssp-details if missing"
      copy:
        content: |
          PACKAGES:


          BaseOS : Yes
          AppStream: Yes
          CloudStream: No
          AvayaStream: Yes (PCF)
        dest: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}"
        mode: '0644'
      when: not details_stat.stat.exists

  tags:
    - details
    - details_backup

---

- name: "[DETAILS] Discover newly downloaded RPMs"
  block:
    - name: "Find BaseOS RPMs"
      find:
        paths: "{{ repo_baseos_path }}"
        patterns: "*.rpm"
        file_type: file
        recurse: yes
      register: new_baseos_rpms

    - name: "Find AppStream RPMs"
      find:
        paths: "{{ repo_appstream_path }}"
        patterns: "*.rpm"
        file_type: file
        recurse: yes
      register: new_appstream_rpms

    - name: "Display discovered RPM counts"
      debug:
        msg: |
          ? Discovered RPMs:
          +- BaseOS   : {{ new_baseos_rpms.matched }}
          +- AppStream: {{ new_appstream_rpms.matched }}
          +- Total    : {{ new_baseos_rpms.matched + new_appstream_rpms.matched }}

    - name: "Combine all downloaded RPMs for processing"
      set_fact:
        all_new_rpms: "{{ (new_baseos_rpms.files | default([])) + (new_appstream_rpms.files | default([])) }}"

  tags:
    - details
    - details_discover

---

- name: "[DETAILS] Generate security information for new RPMs"
  block:
    - name: "Generate package entries with security info"
      shell: |
        set -euo pipefail

        DETAILS="{{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}"
        TMP_NEW="/tmp/details_new_entries_$$.txt"
        TMP_WORK="/tmp/details_work_$$.txt"

        > "$TMP_NEW"

        ADDED=0
        SKIPPED=0
        ERRORS=0

        echo "Processing {{ all_new_rpms | length }} RPM(s)..."

        {% for rpm in all_new_rpms %}
        {
          RPM_PATH="{{ rpm.path }}"
          
          # Skip if doesn't exist
          [ ! -f "$RPM_PATH" ] && exit 0

          # Extract RPM metadata
          PKG=$(rpm -qp --queryformat '%{NAME}' "$RPM_PATH" 2>/dev/null || echo "")
          [ -z "$PKG" ] && exit 0
          
          VER=$(rpm -qp --queryformat '%{VERSION}' "$RPM_PATH" 2>/dev/null || echo "0")
          REL=$(rpm -qp --queryformat '%{RELEASE}' "$RPM_PATH" 2>/dev/null || echo "0")
          ARCH=$(rpm -qp --queryformat '%{ARCH}' "$RPM_PATH" 2>/dev/null || echo "x86_64")
          PKG_VER="${PKG}-${VER}"

          # Check if already in details file
          if grep -qF "$PKG_VER" "$DETAILS" 2>/dev/null; then
            echo "     [SKIP] $PKG_VER (already present)"
            SKIPPED=$((SKIPPED + 1))
            exit 0
          fi

          # Query update info
          ADVISORY=$(dnf updateinfo list security 2>/dev/null | grep " $PKG-" | tail -1 | awk '{print $1}' || echo "UNKNOWN")
          
          SEV_RAW=$(dnf updateinfo list security 2>/dev/null | grep " $PKG-" | tail -1 | awk '{print $2}' || echo "Unknown")
          case "$SEV_RAW" in
            Critical*)  SEV="Critical/Sec." ;;
            Important*) SEV="Important/Sec." ;;
            Moderate*)  SEV="Moderate/Sec." ;;
            Low*)       SEV="Low/Sec." ;;
            *)          SEV="Unknown/Sec." ;;
          esac

          # Query CVEs
          CVES=$(dnf updateinfo list cves 2>/dev/null | grep " $PKG-" | awk '{print $1}' | sort -u | paste -sd ',' - || echo "N/A")

          # Format entry
          ENTRY="     ${PKG}-${VER}-${REL}.${ARCH}.rpm | ${SEV} | ${ADVISORY} | ${CVES}"
          echo "$ENTRY" >> "$TMP_NEW"
          
          echo "     [NEW] ${PKG}-${VER}-${REL}.${ARCH}"
          ADDED=$((ADDED + 1))
        }
        {% endfor %}

        # Append new entries to details file
        if [ -s "$TMP_NEW" ]; then
          # Find where package entries end (before BaseOS/AppStream footer)
          FOOTER_LINE=$(grep -n "^BaseOS" "$DETAILS" 2>/dev/null | head -1 | cut -d: -f1)
          
          if [ -n "$FOOTER_LINE" ]; then
            head -n $((FOOTER_LINE - 2)) "$DETAILS" > "$TMP_WORK"
            cat "$TMP_NEW" >> "$TMP_WORK"
            echo "" >> "$TMP_WORK"
            tail -n +$FOOTER_LINE "$DETAILS" >> "$TMP_WORK"
            mv -f "$TMP_WORK" "$DETAILS"
          else
            cat "$TMP_NEW" >> "$DETAILS"
          fi
        fi

        rm -f "$TMP_NEW" "$TMP_WORK"

        echo "---"
        echo "Added: $ADDED | Skipped: $SKIPPED"
      args:
        executable: /bin/bash
      register: details_generate
      changed_when: "'Added:' in details_generate.stdout"

    - name: "Display generation result"
      debug:
        msg: "{{ details_generate.stdout_lines }}"

  rescue:
    - debug:
        msg: "?  Security info generation encountered issues (will continue)"

  tags:
    - details
    - details_generate

---

- name: "[DETAILS] Final validation and logging"
  block:
    - name: "Verify sbc-ssp-details file exists"
      stat:
        path: "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}"
      register: details_final_stat
      failed_when: not details_final_stat.stat.exists

    - name: "Show updated sbc-ssp-details (first 30 lines)"
      shell: head -30 "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}"
      register: details_preview
      changed_when: false

    - debug:
        msg: "{{ details_preview.stdout_lines }}"

    - name: "Count entries in sbc-ssp-details"
      shell: |
        grep -c "^\s*[a-zA-Z0-9]" "{{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}" || echo 0
      args:
        executable: /bin/bash
      register: details_entry_count
      changed_when: false

    - name: "Display completion summary"
      debug:
        msg: |
          ? sbc-ssp-details UPDATE COMPLETE
          
          ? File Summary:
          +- Location : {{ ssp_path }}/{{ ssp_new_rpms_dir }}/{{ ssp_details_file }}
          +- Entries  : {{ details_entry_count.stdout }}
          +- Status   : Ready for repackaging
          
          Next: Update sbc-release files...

    - name: "Log completion"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: |
          [DETAILS][SUCCESS] {{ ansible_date_time.iso8601 }}
          File: {{ ssp_details_file }}
          Entries: {{ details_entry_count.stdout }}
        create: yes

  tags:
    - details
    - details_summary

---

- name: "[DETAILS] Phase completion"
  lineinfile:
    path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
    line: "[DETAILS][END] {{ ansible_date_time.iso8601 }}"
    create: yes
  ignore_errors: yes
  tags:
    - details
    - always