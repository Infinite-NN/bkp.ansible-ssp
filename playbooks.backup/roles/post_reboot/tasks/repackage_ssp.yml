---
# =============================================================
# Post-Reboot -- Repackage SSP with Updated Modules
# Creates final SSP package: SSP-NNN-01-MonYYYY.tar.gz
# Includes MD5 checksum and TAR archive
# =============================================================

- name: "[PKG] Initialize repackage phase"
  block:
    - name: "Log repackage start"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: "[PKG][START] {{ ansible_date_time.iso8601 }}"
        create: yes

    - name: "Display repackage configuration"
      debug:
        msg: |
          ? SSP Repackage Configuration:
          +- Source      : {{ ssp_path }}
          +- Output Dir  : {{ ssp_release_output_dir }}
          +- Compress    : {{ repackage_compress | default(true) }}
          +- Checksum    : {{ repackage_generate_checksum | default(true) }}

  tags:
    - repackage
    - repackage_init

---

- name: "[PKG] Validate prerequisites"
  block:
    - name: "Verify ssp_path is defined and exists"
      assert:
        that:
          - ssp_path is defined
          - ssp_path | length > 0
        fail_msg: "ssp_path is not defined"
        success_msg: "? ssp_path validated"

    - name: "Verify SSP directory exists"
      stat:
        path: "{{ ssp_path }}"
      register: ssp_pkg_stat
      failed_when: not ssp_pkg_stat.stat.exists

    - name: "Verify output directory exists"
      stat:
        path: "{{ ssp_release_output_dir }}"
      register: output_stat

    - name: "Create output directory if missing"
      file:
        path: "{{ ssp_release_output_dir }}"
        state: directory
        mode: '0755'
        recurse: yes
      when: not output_stat.stat.exists

  rescue:
    - fail:
        msg: "Repackage prerequisite validation failed"

  tags:
    - repackage
    - repackage_validate

---

- name: "[PKG] Determine new SSP package name"
  block:
    - name: "Calculate next month name (01-MonYYYY)"
      shell: |
        YEAR=$(date +%Y)
        MONTH=$(date +%-m)
        NEXT_MONTH=$(( MONTH + 1 ))
        NEXT_YEAR=$YEAR
        
        if [ "$NEXT_MONTH" -gt 12 ]; then
          NEXT_MONTH=1
          NEXT_YEAR=$(( YEAR + 1 ))
        fi
        
        date -d "${NEXT_YEAR}-${NEXT_MONTH}-01" '+%d-%b%Y' | tr '[:upper:]' '[:lower:]'
      args:
        executable: /bin/bash
      register: pkg_month_name
      changed_when: false

    - name: "Read current SSP_NUMBER from sbc-release"
      shell: |
        SSBRC=$(find "{{ ssp_path }}" -name "sbc-release" -type f | head -1)
        if [ -n "$SSBRC" ]; then
          grep "^SSP_NUMBER" "$SSBRC" | tail -1 | grep -oE '[0-9]+' | head -1 || echo "001"
        else
          echo "001"
        fi
      args:
        executable: /bin/bash
      register: current_ssp_num
      changed_when: false

    - name: "Format SSP_NUMBER with zero padding"
      set_fact:
        pkg_ssp_num_padded: "{{ current_ssp_num.stdout | trim | zfill(3) }}"

    - name: "Build final package name"
      set_fact:
        pkg_final_name: "SSP-{{ pkg_ssp_num_padded }}-{{ pkg_month_name.stdout | trim }}"

    - name: "Display package name"
      debug:
        msg: |
          ? Package Name:
          +- SSP Number : {{ pkg_ssp_num_padded }}
          +- Month      : {{ pkg_month_name.stdout | trim }}
          +- Full Name  : {{ pkg_final_name }}

  tags:
    - repackage
    - repackage_name

---

- name: "[PKG] Create TAR archive"
  block:
    - name: "Create temporary working directory"
      tempfile:
        state: directory
        prefix: ssp_repackage_
      register: repackage_tmpdir

    - name: "Copy SSP to working directory with new name"
      shell: |
        set -euo pipefail

        TMPDIR="{{ repackage_tmpdir.path }}"
        FINAL_NAME="{{ pkg_final_name }}"
        WORK_DIR="${TMPDIR}/${FINAL_NAME}"

        mkdir -p "$WORK_DIR"

        echo "Copying SSP to: $WORK_DIR"
        cp -a "{{ ssp_path }}"/. "$WORK_DIR/"

        echo "? SSP copied with new name: $FINAL_NAME"
      args:
        executable: /bin/bash
      changed_when: true

    - name: "Create TAR archive"
      shell: |
        set -euo pipefail

        TMPDIR="{{ repackage_tmpdir.path }}"
        OUTPUT_DIR="{{ ssp_release_output_dir }}"
        FINAL_NAME="{{ pkg_final_name }}"

        cd "$TMPDIR"

        echo "? Creating TAR archive..."
        tar -cf "${OUTPUT_DIR}/${FINAL_NAME}.tar" "$FINAL_NAME" 2>&1 | tail -10

        echo "? TAR archive created"
      args:
        executable: /bin/bash
      register: tar_create
      timeout: "{{ post_reboot_timeout_extract | default(300) }}"
      changed_when: true

    - name: "Display TAR creation result"
      debug:
        msg: "{{ tar_create.stdout_lines }}"

  rescue:
    - name: "Log TAR creation failure"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: "[PKG][TAR_FAILED] {{ ansible_failed_result.msg | default('Unknown error') }}"
        create: yes
      ignore_errors: yes

    - fail:
        msg: "TAR archive creation failed"

  tags:
    - repackage
    - repackage_tar

---

- name: "[PKG] Compress TAR with gzip"
  block:
    - name: "Gzip TAR archive"
      shell: |
        set -euo pipefail

        OUTPUT_DIR="{{ ssp_release_output_dir }}"
        FINAL_NAME="{{ pkg_final_name }}"
        TAR_FILE="${OUTPUT_DIR}/${FINAL_NAME}.tar"

        if [ ! -f "$TAR_FILE" ]; then
          echo "? TAR file not found: $TAR_FILE"
          exit 1
        fi

        echo "? Compressing with gzip..."
        gzip -f "$TAR_FILE"

        TGZ_FILE="${TAR_FILE}.gz"
        TGZ_SIZE=$(stat -c%s "$TGZ_FILE" 2>/dev/null | numfmt --to=iec-i --suffix=B || stat -f%z "$TGZ_FILE" | awk '{printf "%.2fMB", $1/1024/1024}')

        echo "? Compressed: ${FINAL_NAME}.tar.gz (${TGZ_SIZE})"
      args:
        executable: /bin/bash
      register: gzip_result
      when: repackage_compress | default(true) | bool
      changed_when: true

    - debug:
        msg: "{{ gzip_result.stdout_lines }}"

  rescue:
    - debug:
        msg: "?  Gzip compression failed (keeping uncompressed TAR)"

  tags:
    - repackage
    - repackage_gzip

---

- name: "[PKG] Generate checksums"
  block:
    - name: "Generate MD5 checksum"
      shell: |
        set -euo pipefail

        OUTPUT_DIR="{{ ssp_release_output_dir }}"
        FINAL_NAME="{{ pkg_final_name }}"

        cd "$OUTPUT_DIR"

        # Check for .tar.gz first, then .tar
        if [ -f "${FINAL_NAME}.tar.gz" ]; then
          md5sum "${FINAL_NAME}.tar.gz" > "${FINAL_NAME}.tar.gz.md5"
          echo "? MD5 generated for ${FINAL_NAME}.tar.gz"
          cat "${FINAL_NAME}.tar.gz.md5"
        elif [ -f "${FINAL_NAME}.tar" ]; then
          md5sum "${FINAL_NAME}.tar" > "${FINAL_NAME}.tar.md5"
          echo "? MD5 generated for ${FINAL_NAME}.tar"
          cat "${FINAL_NAME}.tar.md5"
        fi
      args:
        executable: /bin/bash
      register: checksum_result
      when: repackage_generate_checksum | default(true) | bool
      changed_when: true

    - debug:
        msg: "{{ checksum_result.stdout_lines }}"

  rescue:
    - debug:
        msg: "?  Checksum generation failed (non-critical)"

  tags:
    - repackage
    - repackage_checksum

---

- name: "[PKG] Final verification and cleanup"
  block:
    - name: "List final packages in output directory"
      find:
        paths: "{{ ssp_release_output_dir }}"
        patterns: "{{ pkg_final_name }}*"
        file_type: file
      register: final_packages

    - name: "Display final packages"
      debug:
        msg: |
          ? REPACKAGING COMPLETE
          
          ? Final Packages:
          {{ final_packages.files | map(attribute='path') | map('basename') | list | join('\n') }}
          
          ? Sizes:
          {{ final_packages.files | map('regex_replace', '(.*)', '- \\1: ') | map(attribute=('size')) | map('human_readable') | list | join('\n') }}

    - name: "Clean up temporary working directory"
      file:
        path: "{{ repackage_tmpdir.path }}"
        state: absent
      ignore_errors: yes

    - name: "Log completion"
      lineinfile:
        path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
        line: |
          [PKG][SUCCESS] {{ ansible_date_time.iso8601 }}
          Package: {{ pkg_final_name }}
          Files: {{ final_packages.matched }}
          Location: {{ ssp_release_output_dir }}
        create: yes

  tags:
    - repackage
    - repackage_verify

---

- name: "[PKG] Phase completion"
  lineinfile:
    path: "{{ log_dir }}/ssp_install_{{ ansible_date_time.date }}.log"
    line: "[PKG][END] {{ ansible_date_time.iso8601 }}"
    create: yes
  ignore_errors: yes
  tags:
    - repackage
    - always